# Warm pool the sleep-consolidation demo claims sandboxes from, with an inline
# template. A small pool of pre-snapshotted sandboxes; the demo claims one for
# the work phase, one for the resume ("wake") phase, and (optionally) one after
# the revert. Resuming a memory snapshot mid-execution requires the controller
# run with --workspace-memory-snapshots and a KVM-capable node (cluster-gated).
apiVersion: mitos.run/v1
kind: SandboxPool
metadata:
  name: sleep-demo-pool
  namespace: mitos-e2e
spec:
  template:
    image: python:3.12-slim
    resources:
      cpu: "1"
      memory: "512Mi"
  warm:
    min: 3
  snapshots:
    snapshotAfter: Ready
