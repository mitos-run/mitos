# A warm pool of Python agent sandboxes with an inline template. This is the
# v1 equivalent of the former SandboxTemplate + SandboxPool pair: the template
# fields (image, init, resources, volumes, network) are inlined into
# spec.template, and warm pool sizing lives under spec.warm.
apiVersion: mitos.run/v1
kind: SandboxPool
metadata:
  name: python-agent-pool
spec:
  template:
    image: python:3.12-slim
    init:
      - "pip install numpy pandas requests httpx"
    resources:
      cpu: "1"
      memory: "512Mi"
    volumes:
      # Agent working directory: CoW-forked so each sandbox gets independent writes.
      - name: workspace
        mountPath: /workspace
        size: 5Gi
        storageClass: btrfs-csi
        forkPolicy: Snapshot
        snapshotClass: btrfs-snapshots

      # Scratch space: wiped on every fork.
      - name: tmp
        mountPath: /tmp
        size: 1Gi
        forkPolicy: Fresh

    network:
      egress: deny
      allow:
        - "api.openai.com:443"
        - "api.anthropic.com:443"
        - "pypi.org:443"
  warm:
    min: 10
  snapshots:
    snapshotAfter: Ready
    scaleDownAfterSnapshot: true
