# Mirror of the // +kubebuilder:rbac markers in internal/controller. Surfaced
# into deploy/rbac/clusterrole.yaml for the production install. controller-gen
# v0.21.0 emits no rbac output under Go 1.26 (loader regression), so this file
# is kept by hand in the controller-gen output shape; regenerate from the
# markers once the tooling supports the toolchain.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mitos-controller
rules:
  - apiGroups:
      - mitos.run
    resources:
      - sandboxclaims
      - sandboxforks
      - sandboxpools
      - workspacerevisions
      - workspaces
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - mitos.run
    resources:
      - sandboxtemplates
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - mitos.run
    resources:
      - sandboxclaims/finalizers
      - sandboxforks/finalizers
    verbs:
      - update
  - apiGroups:
      - mitos.run
    resources:
      - sandboxclaims/status
      - sandboxforks/status
      - sandboxpools/status
      - workspacerevisions/status
      - workspaces/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  # Nodes: get/list/watch to resolve which nodes a pool's placement nodeSelector
  # matches, so husk pods are pinned only to the tenant's dedicated nodes
  # (dedicatedNodes, #172). list/watch are load-bearing for the cached informer.
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  # Secrets RBAC narrowing: bind the controller to the mitos-pool-secrets
  # ClusterRole per pool namespace (EnsurePoolSecretsRoleBinding). bind is scoped
  # by resourceNames; plus rolebindings management. Mirrors the Helm chart.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
    verbs:
      - bind
    resourceNames:
      - mitos-pool-secrets
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
