# Talos worker MachineConfig PATCH for KVM-capable forkd nodes.
#
# This is NOT a full machine config. It is a strategic-merge patch applied over
# the worker.yaml that `talosctl gen config` produces, e.g.:
#
#   talosctl machineconfig patch worker.yaml --patch @deploy/talos/worker-kvm.yaml -o worker-kvm-merged.yaml
#
# or at gen time:
#
#   talosctl gen config <cluster> https://<endpoint>:6443 --config-patch-worker @deploy/talos/worker-kvm.yaml
#
# See deploy/talos/README.md for the full flow and the Hetzner AX dedicated
# hardware requirement (Hetzner Cloud cannot run this: no nested /dev/kvm).
machine:
  kernel:
    modules:
      # Firecracker boots each microVM through /dev/kvm. The kvm module is the
      # arch-neutral core; kvm_intel and kvm_amd are the vendor backends. Both
      # are listed so one image serves Intel and AMD Hetzner AX nodes; the
      # module for the absent vendor simply fails to load and is harmless.
      - name: kvm
      - name: kvm_intel
      - name: kvm_amd
      # The guest agent talks to forkd over a vsock; vhost_vsock provides the
      # host side of that transport.
      - name: vhost_vsock
      # forkd creates a per-sandbox tap device for guest networking; tun is the
      # tun/tap driver behind it.
      - name: tun
  # forkd schedules only onto nodes carrying this label (the DaemonSet
  # nodeSelector mitos.run/kvm: "true" in deploy/daemon/daemonset.yaml).
  nodeLabels:
    mitos.run/kvm: "true"
  # No kubelet allowed-unsafe-sysctls is needed for husk name-based egress: the
  # required net.ipv4.ip_forward is set in the pod network namespace by a
  # short-lived privileged init container on the husk pod (see
  # internal/controller/huskpod.go), so the feature needs no node change.
  # No extra sysctls are required: /dev/kvm comes from the kvm modules, the
  # guest-agent vsock from vhost_vsock, and tap devices from tun. Add
  # machine.sysctls here only if a future networking change needs one.
  #
  # forkd's data dir (--data-dir, default /var/lib/mitos) holds template rootfs
  # images, snapshots, and the per-VM jailer chroot base, which must share one
  # filesystem so forkd can hard-link them into each chroot. By DEFAULT it lives
  # on the node's /var (the Talos EPHEMERAL partition, which normally spans the
  # whole system disk), so no machine.disks entry is needed and there is nothing
  # to misconfigure. Size the system disk for your template set: tens of GB per
  # template plus the warm-pool snapshots.
  #
  # A dedicated data disk (the block below, commented out) is OPTIONAL, for
  # isolation or extra capacity. If you add one, get the device RIGHT: point
  # `device` at the FREE data disk, NOT the OS/system disk. Verify with
  # `talosctl -n <node> get disks` (or lsblk), and WIPE any leftover partition
  # table from a prior OS first. A reset box often keeps old partitions, and
  # Talos will NOT repartition a disk with no free space, so machine.disks can
  # silently land /var/lib/mitos on a tiny leftover partition (we hit a ~100MB
  # one); the template build then fails with "no space left on device" and every
  # fork times out as fork_unavailable. `mitos doctor` has a data-dir-space check
  # that catches this before it bites.
  #
  # disks:
  #   - device: /dev/nvmeXn1   # the FREE data disk, NOT the OS disk; wipe it first
  #     partitions:
  #       - mountpoint: /var/lib/mitos
