apiVersion: v2
name: mitos
# Snapshot-fork sandboxes for AI agents on Kubernetes. Boots Firecracker
# microVMs, forks them via copy-on-write snapshots, and drives the whole
# lifecycle through the mitos.run CRDs.
description: Snapshot-fork sandboxes for AI agents on Kubernetes.
type: application
version: 0.4.1
appVersion: "v0.13.0"
kubeVersion: ">=1.29.0-0"
keywords:
  - sandbox
  - firecracker
  - microvm
  - snapshot
  - fork
  - ai-agents
  - operator
home: https://mitos.run
icon: https://raw.githubusercontent.com/mitos-run/mitos/main/docs/assets/mitos-mark-black.svg
sources:
  - https://github.com/mitos-run/mitos
maintainers:
  - name: mitos-run
    url: https://mitos.run
# Artifact Hub metadata. home, the maintainer url, and the links below all point
# at https://mitos.run so the listing backlinks to the canonical domain.
annotations:
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "true"
  artifacthub.io/links: |
    - name: Homepage
      url: https://mitos.run
    - name: Documentation
      url: https://mitos.run
    - name: Source
      url: https://github.com/mitos-run/mitos
    - name: support
      url: https://github.com/mitos-run/mitos/issues
  artifacthub.io/images: |
    - name: controller
      image: ghcr.io/mitos-run/mitos-controller:v0.13.0
    - name: forkd
      image: ghcr.io/mitos-run/mitos-forkd:v0.13.0
    - name: husk-stub
      image: ghcr.io/mitos-run/mitos-husk-stub:v0.13.0
    - name: kvm-device-plugin
      image: ghcr.io/mitos-run/mitos-kvm-device-plugin:v0.13.0
    - name: facade
      image: ghcr.io/mitos-run/mitos-facade:v0.13.0
    - name: console
      image: ghcr.io/mitos-run/mitos-console:v0.13.0
    - name: gateway
      image: ghcr.io/mitos-run/mitos-gateway:v0.13.0
  artifacthub.io/crds: |
    - kind: SandboxPool
      version: v1
      name: sandboxpools.mitos.run
      displayName: Sandbox Pool
      description: Warm pool of pre-snapshotted sandboxes with an inline template (Pools prepare).
    - kind: Sandbox
      version: v1
      name: sandboxes.mitos.run
      displayName: Sandbox
      description: A single running microVM sandbox instance, sourced from a pool, live fork, or revision (Sandboxes run).
    - kind: Workspace
      version: v1
      name: workspaces.mitos.run
      displayName: Workspace
      description: A durable, versioned filesystem a sandbox persists into (Workspaces persist).
    - kind: WorkspaceRevision
      version: v1
      name: workspacerevisions.mitos.run
      displayName: Workspace Revision
      description: One immutable snapshot in a workspace revision DAG.
  artifacthub.io/crdsExamples: |
    - apiVersion: mitos.run/v1
      kind: Sandbox
      metadata:
        name: agent-session-1
      spec:
        source:
          poolRef:
            name: python-agent-pool
        lifetime:
          timeout: 30m
