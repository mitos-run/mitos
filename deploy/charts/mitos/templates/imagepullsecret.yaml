{{- if .Values.imagePullSecret.create }}
# Registry pull credential for the mitos-* images. By default this carries an
# empty dockerconfigjson ({"auths":{}}); set imagePullSecret.dockerconfigjson to
# a real base64-encoded credential to enable image pulls.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name }}
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.imagePullSecret.dockerconfigjson }}
{{- end }}
