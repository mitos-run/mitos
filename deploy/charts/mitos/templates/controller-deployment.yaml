{{- if and .Values.controller.multiVMFork (not .Values.controller.enableHuskPods) }}
{{- fail "controller.multiVMFork requires controller.enableHuskPods: the multi-vm fork routing co-locates a fork child in a warm husk pod, which only exists on the husk-pods path. Set enableHuskPods: true or multiVMFork: false." }}
{{- end }}
{{- if and .Values.controller.liveCowFork (not .Values.controller.enableHuskPods) }}
{{- fail "controller.liveCowFork requires controller.enableHuskPods: live-cow fork rides the warm husk pod spec, which only exists on the husk-pods path. Set enableHuskPods: true or liveCowFork: false." }}
{{- end }}
{{- if and .Values.controller.huskConnReuse (not .Values.controller.enableHuskPods) }}
{{- fail "controller.huskConnReuse requires controller.enableHuskPods: connection reuse targets husk control RPCs, which only exist on the husk-pods path. Set enableHuskPods: true or huskConnReuse: false." }}
{{- end }}
{{- if and .Values.controller.liveCowChildImport (not .Values.controller.liveCowFork) }}
{{- fail "controller.liveCowChildImport requires controller.liveCowFork: the child-side memfd import only applies to an armed live-cow fork. Set liveCowFork: true or liveCowChildImport: false." }}
{{- end }}
{{- if and .Values.controller.prewarmChild (not .Values.controller.multiVMFork) }}
{{- fail "controller.prewarmChild requires controller.multiVMFork: the pre-warmed child is a co-located multi-vm slot. Set multiVMFork: true or prewarmChild: false." }}
{{- end }}
{{- if and .Values.controller.huskPrepareEgressLink (not .Values.controller.multiVMFork) }}
{{- fail "controller.huskPrepareEgressLink requires controller.multiVMFork: the tap is prepared only by a multi-VM husk pod. Set multiVMFork: true or huskPrepareEgressLink: false." }}
{{- end }}
{{- if and .Values.controller.huskPrepareRestore (not .Values.controller.huskPrepareEgressLink) }}
{{- fail "controller.huskPrepareRestore requires controller.huskPrepareEgressLink: the tap must exist before the snapshot load. Set huskPrepareEgressLink: true or huskPrepareRestore: false." }}
{{- end }}
{{- if and .Values.controller.huskPrepareKernelPrefault (not .Values.controller.huskPrepareRestore) }}
{{- fail "controller.huskPrepareKernelPrefault requires controller.huskPrepareRestore: there is no running guest to warm without the dormant restore. Set huskPrepareRestore: true or huskPrepareKernelPrefault: false." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitos-controller
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "mitos.selectorLabels" (dict "root" . "component" "controller") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mitos.selectorLabels" (dict "root" . "component" "controller") | nindent 8 }}
    spec:
      serviceAccountName: mitos-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: {{ include "mitos.image" (dict "root" . "image" .Values.controller.image) }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          # Production runs the pod-native default: metrics on :8080, health on
          # :8081, PKI bootstrap ENABLED (mTLS to forkd AND to the husk control
          # channel). --disable-pki-bootstrap is deliberately omitted so the
          # control plane refuses to dial forkd or activate a husk pod over an
          # unauthenticated channel.
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            {{- if .Values.controller.enableHuskPods }}
            - --enable-husk-pods
            {{- end }}
            {{- if .Values.controller.multiVMFork }}
            - --multi-vm-fork
            {{- end }}
            {{- if .Values.controller.liveCowFork }}
            - --live-cow-fork
            {{- end }}
            {{- if .Values.controller.huskConnReuse }}
            - --husk-conn-reuse
            {{- end }}
            {{- if .Values.controller.liveCowChildImport }}
            - --live-cow-child-import
            {{- end }}
            {{- if .Values.controller.prewarmChild }}
            - --prewarm-child
            {{- end }}
            {{- if .Values.controller.huskPrepareEgressLink }}
            - --husk-prepare-egress-link
            {{- end }}
            {{- if .Values.controller.huskPrepareRestore }}
            - --husk-prepare-restore
            {{- end }}
            {{- if .Values.controller.huskPrepareKernelPrefault }}
            - --husk-prepare-kernel-prefault
            {{- end }}
            - --husk-stub-image={{ include "mitos.image" (dict "root" . "image" .Values.huskStub.image) }}
            - --husk-data-dir={{ .Values.controller.huskDataDir }}
            {{- if .Values.controller.huskDnsUpstream }}
            - --husk-dns-upstream={{ .Values.controller.huskDnsUpstream }}
            {{- end }}
            {{- if .Values.admissionWebhook.enabled }}
            - --enable-principal-webhook
            {{- end }}
            {{- /* apiV2.poolConversionWebhook is a no-op: mitos.run/v1 is the only served version. */}}
            {{- if .Values.apiV2.poolConversionWebhook.enabled }}
            - --enable-pool-conversion-webhook
            {{- end }}
            {{- if .Values.controller.orgTenancy.enabled }}
            - --enable-org-tenancy
            - --org-default-max-sandboxes={{ .Values.controller.orgTenancy.defaultMaxSandboxes }}
            - --org-default-cpu={{ .Values.controller.orgTenancy.defaultCPU }}
            - --org-default-memory={{ .Values.controller.orgTenancy.defaultMemory }}
            {{- end }}
            {{- /*
            Usage metering (issue #602): the collector scrapes every forkd
            node's /v1/metering, attributes each sandbox to its org via the
            trusted mitos.run/org husk-pod label, and serves the bearer-gated
            internal usage API the console reads. The durable store DSN and the
            bearer token ride secretKeyRef env below; the path carries only
            ids, byte counts, and seconds, never secret values.
            */}}
            {{- if .Values.controller.usage.collector }}
            - --usage-collector
            - --usage-collector-interval={{ .Values.controller.usage.interval }}
            {{- if .Values.controller.usage.apiAddress }}
            - --usage-api-address={{ .Values.controller.usage.apiAddress }}
            {{- end }}
            {{- end }}
            {{- with .Values.controller.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.expose.enabled }}
            - --expose-proxy-admin-url=http://mitos-expose-admin.{{ include "mitos.namespace" . }}.svc:8080
            {{- end }}
          env:
            # Run the control plane (PKI bootstrap, forkd discovery) in the
            # namespace the controller is deployed into, so an install into any
            # namespace works without crash-looping on a missing "mitos" default.
            - name: FORKD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.expose.enabled }}
            - name: EXPOSE_PROXY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.expose.secretName }}
                  key: admin-token
            {{- end }}
            {{- /*
            Usage metering secrets (issue #602): the durable usage store DSN
            (the shared database.dsnSecretRef pattern) and the internal usage
            API bearer token. Both are SECRETS sourced via secretKeyRef ONLY.
            Without the DSN the usage store is in-memory (DEV ONLY, lost on
            restart); without the token the usage API fails closed.
            */}}
            {{- if .Values.controller.usage.collector }}
            {{- include "mitos.database.env" . | nindent 12 }}
            {{- include "mitos.usageToken.env" . | nindent 12 }}
            {{- /*
            Display price list for the internal usage API: the values map
            renders as ONE JSON env value the binary parses strictly (unknown
            keys and negative rates fail startup). Empty renders nothing and
            the illustrative defaults apply. Not a secret.
            */}}
            {{- with .Values.controller.usage.priceList }}
            - name: MITOS_USAGE_PRICELIST
              value: {{ toJson . | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
            {{- if and .Values.controller.usage.collector .Values.controller.usage.apiAddress }}
            - name: usage-api
              containerPort: {{ include "mitos.usageAPIPort" . }}
            {{- end }}
            {{- if include "mitos.controllerWebhookEnabled" . }}
            - name: webhook
              containerPort: {{ .Values.admissionWebhook.port }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- if include "mitos.controllerWebhookEnabled" . }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
      {{- if include "mitos.controllerWebhookEnabled" . }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: mitos-controller-webhook-cert
      {{- end }}
{{- if and .Values.controller.usage.collector .Values.controller.usage.apiAddress }}
---
{{- /*
ClusterIP Service for the controller's INTERNAL usage API (issue #602) so the
console can read the collected per-org usage at
http://mitos-controller-usage.<namespace>.svc:<port>. The endpoint is
machine-to-machine, bearer-gated, and fails closed without a valid token; it is
never exposed outside the cluster by the chart. The UsageAPIRunnable serves on
every controller replica (it is not leader-gated), so the Service is safe with
controller.replicas > 1 when the durable Postgres store is configured.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: mitos-controller-usage
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  selector:
    {{- include "mitos.selectorLabels" (dict "root" . "component" "controller") | nindent 4 }}
  ports:
    - name: usage-api
      port: {{ include "mitos.usageAPIPort" . }}
      targetPort: usage-api
{{- end }}
