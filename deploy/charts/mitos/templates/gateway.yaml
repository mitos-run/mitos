{{- /*
The public, customer-facing API front door (issue #210): cmd/gateway terminates
customer API-key auth, resolves the org, enforces quota, and forwards to the
control plane. It is the programmatic counterpart to the human console. Gated by
gateway.enabled.
*/}}
{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitos-gateway
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "mitos.selectorLabels" (dict "root" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mitos.selectorLabels" (dict "root" . "component" "gateway") | nindent 8 }}
    spec:
      serviceAccountName: mitos-gateway
      {{- include "mitos.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: {{ include "mitos.image" (dict "root" . "image" .Values.gateway.image) }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - --addr=:8080
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mitos-gateway
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  selector:
    {{- include "mitos.selectorLabels" (dict "root" . "component" "gateway") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- if .Values.gateway.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mitos-gateway
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.gateway.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.gateway.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ required "gateway.ingress.host is required when gateway.ingress.enabled" .Values.gateway.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mitos-gateway
                port:
                  name: http
{{- end }}
{{- end }}
