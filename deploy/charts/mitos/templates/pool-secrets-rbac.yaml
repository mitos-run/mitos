{{- /*
  Secrets RBAC narrowing (multi-tenancy). The controller binds itself to the
  mitos-pool-secrets ClusterRole in each pool namespace it adopts, so the
  cluster-wide Secrets grant in clusterrole.yaml can be removed
  (controller.namespacedSecretsRBAC=true). The ClusterRole is a DEFINITION only;
  it is never bound cluster-wide. When namespacedSecretsRBAC is true we also bind
  the controller to it in the controller's OWN namespace (known at install), for
  its PKI and per-claim Secrets there.

  ROLLOUT: keep namespacedSecretsRBAC=false until the per-pool RoleBindings have
  reconciled across all live pool namespaces (the controller creates them while
  it still holds the cluster-wide grant), then flip to true to drop the grant.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.controller.poolSecretsClusterRoleName | default "mitos-pool-secrets" }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
{{- if .Values.controller.namespacedSecretsRBAC }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.controller.poolSecretsClusterRoleName | default "mitos-pool-secrets" }}
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.controller.poolSecretsClusterRoleName | default "mitos-pool-secrets" }}
subjects:
  - kind: ServiceAccount
    name: mitos-controller
    namespace: {{ include "mitos.namespace" . }}
{{- end }}
