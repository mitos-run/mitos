apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mitos-forkd
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: forkd
spec:
  selector:
    matchLabels:
      {{- include "mitos.selectorLabels" (dict "root" . "component" "forkd") | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "mitos.selectorLabels" (dict "root" . "component" "forkd") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      # forkd makes no Kubernetes API calls (it imports no client); do not mount
      # a SA token on this high-value pod.
      automountServiceAccountToken: false
      {{- with .Values.forkd.priorityClassName }}
      # forkd owns every VM, warm pool, and snapshot on its node. If the kubelet
      # evicts it (e.g. node DiskPressure), the node loses ALL fork capability at
      # once, which is the opposite of boring failure behavior. Run it at a
      # node-critical priority so it is never the pod the kubelet sheds; the node
      # filling its data dir must back placement off (capacity heartbeat), not
      # kill the daemon. The device plugin uses the same posture.
      priorityClassName: {{ . }}
      {{- end }}
      {{- include "mitos.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.forkd.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.forkd.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: forkd
          image: {{ include "mitos.image" (dict "root" . "image" .Values.forkd.image) }}
          imagePullPolicy: {{ .Values.forkd.image.pullPolicy }}
          args:
            - --listen=:9090
            - --data-dir={{ .Values.forkd.dataDir }}
            - --firecracker=/usr/local/bin/firecracker
            - --kernel={{ .Values.forkd.dataDir }}/vmlinux
            - --http=:9091
            # Dedicated token-gated TLS listener for peer template distribution.
            # The CAS surface is served here over TLS, while the sandbox
            # exec/files/metrics/healthz API on :9091 keeps its scheme unchanged.
            - --cas-listen=:9092
            - --tls-cert=/etc/forkd/tls/tls.crt
            - --tls-key=/etc/forkd/tls/tls.key
            - --tls-ca=/etc/forkd/ca/ca.crt
            # Guest agent injected as /init for OCI image template builds.
            - --agent-bin=/usr/local/bin/agent
            {{- if .Values.forkd.enableNetworking }}
            # Networking enabled so forkd bakes the eth0 placeholder NIC into
            # every husk template snapshot. The forkd image carries iproute2 +
            # nftables; without them the build aborts and produces empty snapshots.
            - --enable-networking
            {{- end }}
            # Every VM (template build and raw-forkd fork) is launched through the
            # Firecracker jailer: a per-VM uid/gid (uid 0 refused), a per-VM chroot
            # (pivot_root) under --chroot-base, and a nested cgroup. This is what
            # lets the securityContext drop privileged: true for the explicit
            # jailer capability set. --chroot-base lives under --data-dir so the
            # snapshot/kernel/rootfs hard-link into each chroot on one filesystem.
            - --jailer=/usr/local/bin/jailer
            - --chroot-base={{ .Values.forkd.dataDir }}/jailer
            - --uid-range=64000-64999
          env:
            # forkd authenticates to private registries when pulling OCI template
            # images. DOCKER_CONFIG points at the mounted docker-config secret.
            - name: DOCKER_CONFIG
              value: /etc/forkd/docker
          ports:
            - name: grpc
              containerPort: 9090
            - name: metrics
              containerPort: 9091
            # Dedicated token-gated TLS CAS listener (--cas-listen).
            - name: cas
              containerPort: 9092
          # NOT privileged. forkd is the privileged BUILDER concentrated to the
          # explicit jailer capability set: drop ALL, add back only the five the
          # jailer needs (SYS_ADMIN for the chroot-base mount setup + jailer
          # cgroup/namespace setup; CHOWN to hand the chroot to the jailed uid;
          # SETUID/SETGID to drop to it; MKNOD for the in-chroot device nodes;
          # NET_ADMIN for the BUILD-time placeholder tap (`ip tuntap add`,
          # --enable-networking), scoped to forkd's own pod netns; DAC_OVERRIDE so
          # the builder can reopen the template rootfs.ext4 it wrote after the
          # jailer chowned the shared inode to the per-VM uid, #426).
          # /dev/kvm, /dev/net/tun, and /dev/vhost-vsock come from the device plugin (mitos.run/kvm),
          # not a privileged hostPath. allowPrivilegeEscalation: false and the
          # seccomp profile complete the hardening. The base capability set and
          # privileged: false are fixed; forkd.seccompProfile,
          # forkd.appArmorProfile, and forkd.extraCapabilities are the only
          # securityContext knobs. Seccomp and AppArmor profiles can be configured,
          # while capabilities can only be added to the base set. See
          # docs/threat-model.md, docs/platforms/hardened-runtimes.md, and
          # cmd/forkd/jailer.go forkdRequiredCapabilities (#525).
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
                - CHOWN
                - SETUID
                - SETGID
                - MKNOD
                - NET_ADMIN
                - DAC_OVERRIDE
                {{- range .Values.forkd.extraCapabilities }}
                - {{ . }}
                {{- end }}
            seccompProfile:
              {{- toYaml .Values.forkd.seccompProfile | nindent 14 }}
            {{- with .Values.forkd.appArmorProfile }}
            appArmorProfile:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          resources:
            {{- toYaml .Values.forkd.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.forkd.dataDir }}
            - name: tls
              mountPath: /etc/forkd/tls
              readOnly: true
            - name: ca
              mountPath: /etc/forkd/ca
              readOnly: true
            - name: docker-config
              mountPath: /etc/forkd/docker
              readOnly: true
          # Readiness is fail-closed on the required host device (/dev/kvm): if
          # the device plugin or a node kernel module drops it, /readyz returns
          # 503, this pod goes NotReady, and the controller stops routing forks
          # here instead of every fork hanging (issue #571).
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          # Liveness stays on /healthz (process up), so a missing device parks the
          # pod NotReady rather than crash-looping it; readiness recovers with no
          # restart once the device returns.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          hostPath:
            path: {{ .Values.forkd.dataDir }}
            type: DirectoryOrCreate
        # /dev/kvm, /dev/net/tun, and /dev/vhost-vsock are injected by the device plugin
        # (mitos.run/kvm) on Allocate, NOT a privileged hostPath CharDevice.
        # Created by the controller's PKI bootstrap (EnsurePKI) at startup.
        - name: tls
          secret:
            secretName: mitos-forkd-tls
        # Only the CA certificate is projected; the CA private key in this secret
        # must never reach forkd.
        - name: ca
          secret:
            secretName: mitos-ca
            items:
              - key: ca.crt
                path: ca.crt
        # forkd's registry credentials for OCI template pulls. Reuses the pull
        # dockerconfigjson secret, projected to the config.json name the auth
        # resolver reads under DOCKER_CONFIG.
        - name: docker-config
          secret:
            secretName: {{ .Values.imagePullSecret.name }}
            # Optional so forkd starts even when no pull secret exists (public
            # base images need none). Without this a missing imagePullSecret is a
            # FailedMount that blocks forkd indefinitely (issue #173).
            optional: true
            items:
              - key: .dockerconfigjson
                path: config.json
