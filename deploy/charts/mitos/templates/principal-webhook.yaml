{{- if .Values.admissionWebhook.enabled }}
{{- /*
  Validating admission webhook that binds SandboxClaim.spec.serviceAccount to
  RBAC: the creator must be authorized to impersonate the named ServiceAccount.
  See internal/admission and the controller --enable-principal-webhook flag.

  Certs: this renders a self-signed serving cert with the sprig genSignedCert
  helper and injects the CA into the webhook's caBundle. The cert is regenerated
  on every `helm upgrade` (Helm templating is stateless), which bounces the
  webhook briefly; for production rotation prefer cert-manager (set
  admissionWebhook.certManager and supply your own Certificate/Issuer, then this
  self-signed path is skipped). This path keeps the chart dependency-free for a
  quick multi-tenant enablement.
*/}}
{{- $svc := "mitos-principal-webhook" }}
{{- $ns := include "mitos.namespace" . }}
{{- $altNames := list (printf "%s.%s.svc" $svc $ns) (printf "%s.%s.svc.cluster.local" $svc $ns) }}
{{- $ca := genCA "mitos-principal-webhook-ca" 3650 }}
{{- $cert := genSignedCert $svc nil $altNames 3650 $ca }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc }}
  namespace: {{ $ns }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: principal-webhook
spec:
  selector:
    {{- include "mitos.selectorLabels" (dict "root" . "component" "controller") | nindent 4 }}
  ports:
    - port: 443
      targetPort: webhook
---
apiVersion: v1
kind: Secret
metadata:
  name: mitos-principal-webhook-cert
  namespace: {{ $ns }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: principal-webhook
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: mitos-principal
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: principal-webhook
webhooks:
  - name: principal.mitos.run
    admissionReviewVersions: ["v1"]
    sideEffects: None
    # Fail closed by default: a claim is rejected if the webhook is unreachable,
    # so the self-asserted principal can never slip past while the webhook is
    # down. Override to Ignore only if availability outranks the guarantee.
    failurePolicy: {{ .Values.admissionWebhook.failurePolicy }}
    clientConfig:
      service:
        name: {{ $svc }}
        namespace: {{ $ns }}
        path: /validate-mitos-run-v1alpha1-sandboxclaim
        port: 443
      caBundle: {{ $ca.Cert | b64enc | quote }}
    rules:
      - apiGroups: ["mitos.run"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["sandboxclaims"]
        scope: Namespaced
{{- end }}
