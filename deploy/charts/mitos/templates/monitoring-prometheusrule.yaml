{{- if .Values.monitoring.enabled }}
# PrometheusRule for the mitos.run control plane. Requires the Prometheus
# Operator (the monitoring.coreos.com/v1 PrometheusRule CRD). Opt-in via
# monitoring.enabled. Thresholds are environment-tunable starting points, not
# established SLOs.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mitos-control-plane
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
    # Picked up by a Prometheus Operator configured to select this label.
    release: {{ .Values.monitoring.prometheusRuleRelease }}
spec:
  groups:
    - name: mitos-claims
      rules:
        - alert: ClaimErrorRateHigh
          # Terminal claim failures, split by pool and coarse reason.
          expr: |
            sum by (pool, reason) (rate(mitos_claim_errors_total[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Claim error rate elevated for pool {{`{{ $labels.pool }}`}} (reason {{`{{ $labels.reason }}`}})"
            description: >
              Claims in pool {{`{{ $labels.pool }}`}} are failing terminally at
              {{`{{ printf "%.3f" $value }}`}}/s for the reason {{`{{ $labels.reason }}`}}
              over the last 5m, sustained for 10m. This is a structural failure,
              not a transient requeue. Threshold is environment-tunable.
            runbook_url: "https://github.com/mitos-run/mitos/blob/main/docs/runbooks/ClaimErrorRateHigh.md"

        - alert: ClaimsPendingSustained
          # A sustained pending-requeue rate is capacity exhaustion.
          expr: |
            sum(rate(mitos_claim_pending_total[5m])) > 0.1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Claims sustained pending (capacity exhaustion)"
            description: >
              Claims are being requeued for lack of a ready snapshot at
              {{`{{ printf "%.3f" $value }}`}}/s over 5m, sustained for 15m. The fleet
              cannot place new claims: warm pools are drained or nodes are full.
              Threshold is environment-tunable.
            runbook_url: "https://github.com/mitos-run/mitos/blob/main/docs/runbooks/ClaimsPendingSustained.md"

    - name: mitos-pools
      rules:
        - alert: WarmPoolStarved
          # Near-zero ready snapshots means the warm pool is starved.
          expr: |
            min by (pool) (mitos_pool_ready_snapshots) < 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Warm pool {{`{{ $labels.pool }}`}} starved of ready snapshots"
            description: >
              Pool {{`{{ $labels.pool }}`}} has fewer than 1 ready snapshot for 10m.
              The warm pool is starved; new claims into this pool will cold-fork
              or pend. Compare against the pool's desired warm count. Threshold
              is environment-tunable.
            runbook_url: "https://github.com/mitos-run/mitos/blob/main/docs/runbooks/WarmPoolStarved.md"

    - name: mitos-gc
      rules:
        - alert: OrphanSweepSpike
          # Orphan sweeps reap forkd VMs the GC found with no owning claim.
          expr: |
            sum(rate(mitos_orphan_sweeps_total[15m])) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Orphan VM sweeps sustained (leaked sandboxes being reaped)"
            description: >
              The garbage collector is reaping orphan sandbox VMs at
              {{`{{ printf "%.4f" $value }}`}}/s over 15m, sustained for 15m. VMs are
              leaking and being cleaned up; investigate the source of the leak.
              Threshold is environment-tunable.
            runbook_url: "https://github.com/mitos-run/mitos/blob/main/docs/runbooks/OrphanSweepSpike.md"

    - name: mitos-fork-latency
      rules:
        - alert: ForkLatencyHigh
          # p99 fork latency from the forkd histogram. The <=10ms p99 fork is a
          # bare-metal TARGET, not this threshold: this alert fires on a looser,
          # cluster-specific budget so a busy or virtualized node does not page.
          expr: |
            histogram_quantile(
              0.99,
              sum by (le) (rate(mitos_fork_duration_seconds_bucket[5m]))
            ) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Fork p99 latency above the cluster budget"
            description: >
              p99 fork latency is {{`{{ printf "%.4f" $value }}`}}s over 5m, above the
              cluster budget, sustained for 10m. The <=10ms p99 fork is a
              bare-metal target, not this threshold; this budget is
              environment-tunable. See the runbook for what drives fork latency.
            runbook_url: "https://github.com/mitos-run/mitos/blob/main/docs/runbooks/ForkLatencyHigh.md"

    - name: mitos-distribution
      rules:
        - alert: SnapshotDistributionLagHigh
          # p95 time to distribute a template snapshot to a deficit node by pull
          # from a holder. Populated ONLY on the multi-node distribution path (a
          # peer token AND a holder), so on a single-node cluster it is empty and
          # this never fires. Threshold is environment-tunable.
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, template) (rate(mitos_snapshot_distribution_lag_seconds_bucket[10m]))
            ) > 60
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Snapshot distribution lag high for template {{`{{ $labels.template }}`}}"
            description: >
              p95 snapshot distribution lag for template {{`{{ $labels.template }}`}}
              is {{`{{ printf "%.1f" $value }}`}}s over 10m, sustained for 15m.
              Deficit nodes are pulling the snapshot slowly from a holder; check CAS
              bandwidth and holder load. Populated only on the multi-node path.
{{- if .Values.canary.enabled }}

    - name: mitos-canary
      rules:
        - alert: CanaryDown
          # The synthetic canary's last full cycle (create, exec, verify) failed.
          # This is the closest signal to "a real user cannot fork right now": it
          # rides the same HostedBackend path the SDKs use.
          expr: |
            mitos_canary_up == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Synthetic canary cannot fork and exec a sandbox"
            description: >
              The mitos canary's last full cycle failed for 5m: create, exec, or
              output verification did not succeed against the live gateway. A real
              user would see fork_unavailable or a broken exec right now. Check
              the warm pool, forkd readiness, and the gateway before customers do.
            runbook_url: "https://github.com/mitos-run/mitos/blob/main/docs/runbooks/CanaryDown.md"

        - alert: CanaryStale
          # No successful cycle for 15m even if up briefly flapped: the canary is
          # either wedged or the path has been failing the whole window.
          expr: |
            time() - mitos_canary_last_success_timestamp_seconds > 900
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Synthetic canary has had no successful cycle for 15m"
            description: >
              The mitos canary has not completed a green cycle in over 15m. Either
              the probe loop is wedged (the pod should have restarted; check its
              liveness) or the sandbox path has been failing the whole window.
              Treat as a user-facing outage until proven otherwise.
            runbook_url: "https://github.com/mitos-run/mitos/blob/main/docs/runbooks/CanaryDown.md"

        - alert: CanarySandboxLeak
          # The user path works but cleanup keeps failing: the canary is leaking
          # sandboxes every cycle. Not user-facing, but it accumulates cost and
          # eventually exhausts capacity.
          expr: |
            sum(rate(mitos_canary_probe_total{phase="terminate",result="failure"}[15m])) > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Canary is leaking sandboxes (terminate keeps failing)"
            description: >
              The canary's terminate step has been failing for 30m, so every
              cycle leaks a sandbox. The fork path still works, but leaked
              sandboxes accumulate cost and can exhaust capacity. Check the
              terminate/DELETE path and reap any orphaned canary sandboxes.
            runbook_url: "https://github.com/mitos-run/mitos/blob/main/docs/runbooks/CanaryDown.md"
{{- end }}
{{- end }}
