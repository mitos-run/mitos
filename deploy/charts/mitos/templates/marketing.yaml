{{- /*
Marketing static site (WS2 front-door): serves the public mitos.run pages built
from the Astro site in github.com/mitos-run/website. Gated by
marketing.enabled (default false).

NOTE: The marketing image (Astro dist baked into a container) is built and
published by the website repo CI, not by this chart. Set marketing.image to the
published OCI reference before enabling this resource. The integration
(wiring the website repo build into this image field) is a follow-up task.
A placeholder such as "nginxinc/nginx-unprivileged:latest" can be used for
staging until the production image is available.
*/}}
{{- if .Values.marketing.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitos-marketing
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: marketing
spec:
  replicas: {{ .Values.marketing.replicas }}
  selector:
    matchLabels:
      {{- include "mitos.selectorLabels" (dict "root" . "component" "marketing") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mitos.selectorLabels" (dict "root" . "component" "marketing") | nindent 8 }}
    spec:
      {{- include "mitos.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: marketing
          # The production image is the Astro dist built from
          # github.com/mitos-run/website. Set marketing.image to the published
          # OCI reference. Use "nginxinc/nginx-unprivileged:latest" as a
          # staging placeholder until the production image is available.
          image: {{ required "marketing.image is required when marketing.enabled is true; set it to the Astro dist OCI reference or a staging placeholder" .Values.marketing.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              # The marketing image is nginxinc/nginx-unprivileged, which runs as
              # uid 101 and listens on 8080 (it cannot bind 80 as non-root). The
              # Service targetPort and the probes reference this named port, so
              # the Service still exposes 80 while the pod serves on 8080.
              containerPort: {{ .Values.marketing.containerPort | default 8080 }}
          resources:
            {{- toYaml .Values.marketing.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          # readOnlyRootFilesystem (above) blocks all writes to the image layer.
          # nginxinc/nginx-unprivileged still needs a writable /tmp (it writes
          # its pid and request temp files there) and /var/cache/nginx. Mount
          # emptyDir on both so the pod runs read-only-root without crashlooping.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mitos-marketing
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: marketing
spec:
  selector:
    {{- include "mitos.selectorLabels" (dict "root" . "component" "marketing") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
