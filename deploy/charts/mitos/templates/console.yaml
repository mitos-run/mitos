{{- /*
The hosted/self-hosted web console (issue #214): the BFF + embedded SPA served
by cmd/console. ONE image and ONE bundle for both editions; behavior is driven
by the capabilities env below, which the binary serves at GET
/console/capabilities. Gated by console.enabled.

The #208 hard gate is enforced here: console.signup defaults false (waitlist
mode) and billing defaults off; both are server-controlled env, never client
flags, so no browser can flip on self-serve onboarding or billing.
*/}}
{{- if .Values.console.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mitos-console
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mitos-console
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
rules:
  # The live-sandbox view reads the control-plane records, scoped to one org at
  # query time. Read-only; the console never mutates the engine CRDs.
  - apiGroups: ["mitos.run"]
    resources: ["sandboxes", "sandboxpools", "workspaces", "workspacerevisions"]
    verbs: ["get", "list", "watch"]
  {{- if .Values.console.onboarding.clusterProvisioning }}
  # Cluster onboarding (issue #215): a verified signup creates the cluster-scoped
  # Org custom resource, which the controller's OrgReconciler turns into a per-org
  # namespace. The console needs get/create/update on orgs to do this idempotently
  # (CreateOrUpdate). It never deletes orgs and never touches the org status. Only
  # granted when cluster onboarding is enabled.
  - apiGroups: ["mitos.run"]
    resources:
      - orgs
    verbs: ["get", "create", "update"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mitos-console
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mitos-console
subjects:
  - kind: ServiceAccount
    name: mitos-console
    namespace: {{ include "mitos.namespace" . }}
{{- if .Values.console.secrets.kube.enabled }}
---
{{- /*
The kube secret provider manages org-namespaced Secrets. It binds to the
existing mitos-pool-secrets ClusterRole (the same definition the controller
uses) in the console's own namespace; per-org-namespace bindings are created by
the tenancy track as org namespaces are provisioned.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mitos-console-secrets
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.controller.poolSecretsClusterRoleName | default "mitos-pool-secrets" }}
subjects:
  - kind: ServiceAccount
    name: mitos-console
    namespace: {{ include "mitos.namespace" . }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitos-console
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  replicas: {{ .Values.console.replicas }}
  selector:
    matchLabels:
      {{- include "mitos.selectorLabels" (dict "root" . "component" "console") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mitos.selectorLabels" (dict "root" . "component" "console") | nindent 8 }}
    spec:
      serviceAccountName: mitos-console
      {{- include "mitos.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: console
          image: {{ include "mitos.image" (dict "root" . "image" .Values.console.image) }}
          imagePullPolicy: {{ .Values.console.image.pullPolicy }}
          args:
            - --addr=:8080
          env:
            # Capabilities the binary serves at /console/capabilities. ONE bundle,
            # behavior driven entirely by these server-controlled values.
            - name: MITOS_CONSOLE_EDITION
              value: {{ .Values.console.edition | quote }}
            - name: MITOS_CONSOLE_SIGNUP
              value: {{ .Values.console.signup | quote }}
            - name: MITOS_CONSOLE_BILLING
              value: {{ .Values.console.billing.enabled | quote }}
            {{- /*
            Paddle (Merchant of Record) selection. The provider switches to Paddle
            only when BOTH the API key and the webhook signing secret are present;
            otherwise the binary keeps the Stripe default. Both are SECRETS,
            injected via secretKeyRef ONLY: their values never appear in the
            rendered manifests. Gated by billing.enabled so the env is inert when
            billing is off.
            */}}
            {{- if .Values.console.billing.enabled }}
            {{- with .Values.console.billing.paddle.apiKeySecretRef }}
            {{- if .name }}
            - name: MITOS_CONSOLE_PADDLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .name | quote }}
                  key: {{ .key | default "api-key" | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.console.billing.paddle.webhookSecretRef }}
            {{- if .name }}
            - name: MITOS_CONSOLE_PADDLE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .name | quote }}
                  key: {{ .key | default "webhook-secret" | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.console.billing.paddle.baseURL }}
            - name: MITOS_CONSOLE_PADDLE_BASE_URL
              value: {{ .Values.console.billing.paddle.baseURL | quote }}
            {{- end }}
            {{- end }}
            - name: MITOS_CONSOLE_OIDC_ISSUER
              value: {{ .Values.console.oidc.issuerURL | quote }}
            - name: MITOS_CONSOLE_OIDC_CLIENT_ID
              value: {{ .Values.console.oidc.clientID | quote }}
            {{- if .Values.console.oidc.clientSecretRef }}
            - name: MITOS_CONSOLE_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.console.oidc.clientSecretRef }}
                  key: client-secret
            {{- end }}
            {{- if .Values.console.oidc.redirectURL }}
            - name: MITOS_CONSOLE_OIDC_REDIRECT_URL
              value: {{ .Values.console.oidc.redirectURL | quote }}
            {{- end }}
            - name: MITOS_CONSOLE_SECRET_PROVIDERS
              value: {{ include "mitos.console.secretProviders" . | quote }}
            {{- /*
            Onboarding (issue #215). The public signup/verify endpoints are mounted
            only when console.signup is true; this env configures HOW the
            verification email is delivered and WHETHER a verified signup provisions
            the per-org namespace. The SMTP password is sourced from a Secret ONLY,
            never inlined as a plain env value.
            */}}
            {{- if .Values.console.onboarding.verifyURL }}
            - name: MITOS_ONBOARDING_VERIFY_URL
              value: {{ .Values.console.onboarding.verifyURL | quote }}
            {{- end }}
            {{- if .Values.console.onboarding.clusterProvisioning }}
            - name: MITOS_CONSOLE_ORG_TENANCY
              value: "true"
            {{- end }}
            {{- if .Values.console.onboarding.smtp.host }}
            - name: MITOS_SMTP_HOST
              value: {{ .Values.console.onboarding.smtp.host | quote }}
            - name: MITOS_SMTP_PORT
              value: {{ .Values.console.onboarding.smtp.port | quote }}
            - name: MITOS_SMTP_FROM
              value: {{ .Values.console.onboarding.smtp.from | quote }}
            {{- if .Values.console.onboarding.smtp.credentialsSecretRef }}
            - name: MITOS_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.console.onboarding.smtp.credentialsSecretRef }}
                  key: username
            - name: MITOS_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.console.onboarding.smtp.credentialsSecretRef }}
                  key: password
            {{- end }}
            {{- end }}
            {{- if .Values.console.secrets.openbao.enabled }}
            - name: MITOS_CONSOLE_OPENBAO_ADDR
              value: {{ .Values.console.secrets.openbao.address | quote }}
            - name: MITOS_CONSOLE_OPENBAO_PER_ORG
              value: {{ .Values.console.secrets.openbao.perOrg | quote }}
            {{- end }}
            {{- if or .Values.expose.enabled .Values.frontdoor.enabled }}
            {{- /*
            Mount the shared resolve token so the console serves POST
            /internal/session/resolve for the expose proxy or the frontdoor's
            session-resolution hop. The token is NEVER inlined; it is sourced
            from the same Secret key (resolve-token) in expose.secretName
            (default: mitos-expose). Gated so the endpoint is inactive when
            neither expose nor frontdoor is enabled.
            */}}
            - name: MITOS_IDENTITY_RESOLVE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.expose.secretName }}
                  key: resolve-token
            {{- end }}
            {{- /*
            Usage read side (issue #602): the console reads the SAME per-org
            usage the controller's collector recorded over the bearer-gated
            internal usage API. The URL defaults to the chart's in-cluster
            usage Service; console.usage.url overrides it for split
            deployments. The bearer token is the SAME secretKeyRef the
            controller gates the API on, never an inline value. Rendered when
            the collector is on or a URL override is set; otherwise the console
            falls back to its in-memory usage store (dev only).
            */}}
            {{- if or .Values.controller.usage.collector .Values.console.usage.url }}
            - name: MITOS_USAGE_API_URL
              {{- if .Values.console.usage.url }}
              value: {{ .Values.console.usage.url | quote }}
              {{- else }}
              value: {{ printf "http://mitos-controller-usage.%s.svc%s" (include "mitos.namespace" .) .Values.controller.usage.apiAddress | quote }}
              {{- end }}
            {{- include "mitos.usageToken.env" . | nindent 12 }}
            {{- end }}
            {{- include "mitos.database.env" . | nindent 12 }}
            {{- include "mitos.telemetry.env" . | nindent 12 }}
            {{- with .Values.console.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.console.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mitos-console
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  selector:
    {{- include "mitos.selectorLabels" (dict "root" . "component" "console") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- if .Values.console.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mitos-console
  namespace: {{ include "mitos.namespace" . }}
  labels:
    {{- include "mitos.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
  {{- with .Values.console.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.console.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ required "console.ingress.host is required when console.ingress.enabled" .Values.console.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mitos-console
                port:
                  name: http
{{- end }}
{{- end }}
