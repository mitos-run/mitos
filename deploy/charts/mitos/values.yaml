# Default values for the mitos chart.
# Every key below maps to a field in the deploy/ kustomize manifests this chart
# translates. Only the knobs documented here are parameterized; the security
# posture is reproduced verbatim in the templates and is NOT loosely
# configurable: privileged stays false, capabilities drop ALL and add back only
# the fixed builder set, hostPath, the KVM resource, and NET_ADMIN are fixed. The
# two NARROW exceptions, added for hardened container runtimes (issue #525), are
# forkd.seccompProfile and forkd.extraCapabilities: the seccomp profile can be
# swapped (RuntimeDefault by default) and capabilities can only be ADDED to the
# base set. They default to the CI-proven hardened values; see values/talos.yaml.

# Image settings. The full reference for each component is composed as
# image.registry / <component>.image.repository : <tag>, where the tag is the
# per-component tag, or global.imageTag when set (global overrides all).
image:
  # Container registry that hosts every mitos image.
  registry: ghcr.io/mitos-run

# Global overrides applied across all components.
global:
  # When set, this tag overrides every per-component image.tag below. Leave
  # empty to use the per-component tags. Example: "v0.4.1".
  imageTag: ""

# Controller (Deployment): reconciles the mitos.run CRDs and drives forkd.
controller:
  image:
    # Image repository for the controller (appended to image.registry).
    repository: mitos-controller
    # Image tag for the controller. Defaults to the chart appVersion.
    tag: ""
    # Image pull policy for the controller container.
    pullPolicy: IfNotPresent
  # Number of controller replicas. Multiple replicas run HA with leader election.
  replicas: 2
  # Controller container resource requests and limits.
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # When true, render --enable-husk-pods so each SandboxPool maintains a warm
  # pool of pre-scheduled husk pods. When false, the flag is omitted.
  enableHuskPods: true
  # Value for --husk-data-dir: the node template snapshot root the husk pods
  # mount; must match forkd's --data-dir.
  huskDataDir: /var/lib/mitos
  # Value for --husk-dns-upstream. Empty omits the flag entirely (name-based
  # egress allowlists stay opt-out). Set to a comma-separated resolver list,
  # for example "1.1.1.1:53,8.8.8.8:53", to enable name-based egress allowlists.
  huskDnsUpstream: ""
  # The extended resource name husk pods request for KVM scheduling. Reproduced
  # for documentation; the controller passes it through to the husk pod spec.
  kvmResourceName: mitos.run/kvm
  # Secrets RBAC narrowing (multi-tenancy). When true, the controller's
  # cluster-wide Secrets grant is REMOVED; it instead reaches Secrets only in its
  # own namespace and in pool namespaces it has adopted (it binds itself to the
  # mitos-pool-secrets ClusterRole per namespace). ROLLOUT: leave false until the
  # per-pool RoleBindings have reconciled across all live pool namespaces (the
  # controller creates them while it still holds the cluster-wide grant), then
  # flip to true. Default false so upgrades do not lose Secrets access mid-flight.
  namespacedSecretsRBAC: false
  # Name of the chart-provisioned ClusterRole the controller binds per pool
  # namespace for Secrets access. Must match the controller's expectation.
  poolSecretsClusterRoleName: mitos-pool-secrets
  # Per-org namespace tenancy (issue #288, the hosted-SaaS multi-tenant
  # boundary). When true, render --enable-org-tenancy so the controller runs the
  # OrgReconciler: for each Org CR it provisions a per-org isolation namespace
  # (mitos-org-<id>) with PSA privileged labels, a ResourceQuota ceiling, a
  # LimitRange, a default-deny NetworkPolicy + DNS egress, and the
  # mitos-pool-secrets RoleBinding, all owner-referenced to the Org. It also adds
  # the controller RBAC rules the reconciler needs (namespaces, resourcequotas,
  # limitranges, orgs). Default false so a self-host single-tenant install is
  # unaffected; the hosted edition sets it true. Cross-org isolation is the
  # separate namespace + default-deny NetworkPolicy + ResourceQuota + the microVM
  # (a NetworkPolicy-enforcing CNI is required; see docs/threat-model.md).
  orgTenancy:
    enabled: false
    # Default per-org sandbox/pod count ceiling for an Org's ResourceQuota when the
    # Org sets no spec.quota override (the abuse-control primitive).
    defaultMaxSandboxes: 50
    # Default per-org aggregate CPU limit ceiling (a Kubernetes quantity).
    defaultCPU: "32"
    # Default per-org aggregate memory limit ceiling (a Kubernetes quantity).
    defaultMemory: "64Gi"
  # Extra args appended verbatim to the controller container args.
  extraArgs: []
  # Extra env vars appended verbatim to the controller container. FORKD_NAMESPACE
  # is always set to the controller's own namespace via the downward API.
  extraEnv: []

# huskStub image: the image husk pods run; passed to the controller via
# --husk-stub-image. No standalone workload is rendered for it.
huskStub:
  image:
    repository: mitos-husk-stub
    tag: ""
    pullPolicy: IfNotPresent

# forkd (DaemonSet): the per-node privileged snapshot builder. Schedules only on
# nodes labeled mitos.run/kvm=true.
forkd:
  image:
    repository: mitos-forkd
    tag: ""
    pullPolicy: IfNotPresent
  # forkd owns all VMs, warm pools, and snapshots on its node; a kubelet eviction
  # (e.g. node DiskPressure) takes the whole node's fork capability down. Run it at
  # a node-critical priority so it is never evicted under resource pressure. Set to
  # "" to disable (e.g. on clusters without this built-in PriorityClass).
  priorityClassName: system-node-critical
  # forkd container resource requests and limits. mitos.run/kvm is the device
  # plugin resource that injects /dev/kvm and /dev/net/tun; it REPLACES
  # privileged: true for device access and must stay in both requests and limits
  # (an extended resource requires request == limit). Do not remove it.
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
      mitos.run/kvm: "1"
    limits:
      memory: "16Gi"
      cpu: "8"
      mitos.run/kvm: "1"
  # Value for forkd --data-dir and the data hostPath mountPath.
  dataDir: /var/lib/mitos
  # When true, render --enable-networking so forkd bakes the eth0 placeholder
  # NIC into every husk template snapshot.
  enableNetworking: true
  # forkd container seccomp profile. The default RuntimeDefault is validated
  # against the Docker/containerd seccomp default, which permits the jailer's
  # pivot_root(2) when CAP_SYS_ADMIN is held, so kind/containerd passes. Some
  # hardened runtimes (Talos) deny pivot_root under their RuntimeDefault profile
  # even with CAP_SYS_ADMIN; the jailer then fails with EPERM and forkd cannot
  # build template snapshots. On those runtimes set this to Unconfined (or a
  # tailored Localhost profile that allows pivot_root and the jailer mount
  # syscalls). See values/talos.yaml and docs/platforms/hardened-runtimes.md (#525).
  # This object is rendered verbatim into securityContext.seccompProfile, so a
  # Localhost profile is also expressible:
  #   seccompProfile:
  #     type: Localhost
  #     localhostProfile: profiles/mitos-forkd.json
  seccompProfile:
    type: RuntimeDefault
  # Extra Linux capabilities ADDED to forkd's hardened base set (the base set is
  # drop ALL plus the fixed builder capabilities and is NOT removable here). Empty
  # by default. On hardened runtimes add FOWNER so the jailer's chmod of the
  # per-VM chroot root does not fail with EPERM; values/talos.yaml sets this.
  extraCapabilities: []
  # nodeSelector pinning forkd to KVM nodes. forkd stays Pending until a matching
  # node joins.
  nodeSelector:
    mitos.run/kvm: "true"
  # Tolerations so forkd lands on dedicated, tainted KVM workers.
  tolerations:
    - key: mitos.run/dedicated
      operator: Exists
      effect: NoSchedule

# KVM device plugin (DaemonSet): advertises mitos.run/kvm only where /dev/kvm
# exists. Runs on every node.
devicePlugin:
  # Gate the device plugin DaemonSet.
  enabled: true
  image:
    repository: mitos-kvm-device-plugin
    tag: ""
    pullPolicy: IfNotPresent

# Kernel provisioner (DaemonSet): stages the guest kernel into the node hostPath
# on KVM nodes via an init container, then idles.
kernelProvisioner:
  # Gate the kernel-stage DaemonSet.
  enabled: true
  # The guest kernel image URL the init container downloads. Override to host
  # your own kernel.
  kernelUrl: https://s3.amazonaws.com/spec.ccfc.min/img/quickstart_guide/x86_64/kernels/vmlinux.bin
  # Expected SHA256 (hex) of the kernel at kernelUrl. STRONGLY RECOMMENDED: when
  # set, the kernel-stage init container verifies the staged file and fails
  # closed on mismatch, so a swapped upstream object or a MITMed download cannot
  # boot a backdoored kernel into every microVM. Left empty the kernel is staged
  # WITHOUT verification (a warning is logged). Compute with:
  #   curl -fsSL <kernelUrl> | sha256sum
  kernelSha256: ""

# Validating admission webhook that binds Sandbox.spec.serviceAccount to RBAC
# (the creator must be able to impersonate the named ServiceAccount).
# spec.serviceAccount is the principal a workspace memory-snapshot resume is
# bound to, so without this it is self-asserted. STRONGLY RECOMMENDED to enable
# alongside controller.workspaceMemorySnapshots in a multi-tenant cluster. Off by
# default so single-tenant and webhook-less installs are unaffected.
admissionWebhook:
  enabled: false
  # Container/Service port the controller serves the webhook on.
  port: 9443
  # Fail closed: reject a claim if the webhook is unreachable. Set to Ignore only
  # if availability outranks the principal guarantee.
  failurePolicy: Fail

# API v1 migration completed (issue #23, ADR 0007). The conversion webhook and
# staged-rollout knobs from v1alpha2 are no longer needed: mitos.run/v1 is the
# only served group-version. This block is retained as a no-op placeholder so
# existing values files that set apiV2.poolConversionWebhook.enabled do not
# cause Helm render failures.
apiV2:
  poolConversionWebhook:
    enabled: false

# Facade (Deployment): the agents.x-k8s.io conformance facade. Opt-in.
facade:
  # Gate the facade Deployment plus its ServiceAccount and RBAC.
  enabled: false
  image:
    repository: mitos-facade
    tag: ""
    pullPolicy: IfNotPresent
  # The mitos.run pool a Sandbox binds to when it carries no bridge annotation.
  defaultPool: default
  # The cluster DNS domain the facade uses to build in-cluster URLs.
  clusterDomain: cluster.local
  # Facade container resource requests and limits.
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# Monitoring artifacts: the PrometheusRule and the Grafana dashboard ConfigMap.
# Opt-in; requires the Prometheus Operator CRDs and a Grafana sidecar.
monitoring:
  # Gate both the PrometheusRule and the dashboard ConfigMap.
  enabled: false
  # Label value selected by the Prometheus Operator ruleSelector for the rule.
  prometheusRuleRelease: prometheus

# Namespace the workloads install into.
namespace:
  # The namespace name. All namespaced resources are placed here.
  name: mitos
  # When true, the chart renders the Namespace object with the PodSecurity
  # admission labels (enforce=privileged) forkd and the device plugin require.
  create: true

# Image pull secret for the mitos-* images. The published images on
# ghcr.io/mitos-run are PUBLIC, so a default install needs no credential and the
# knobs below stay off. They exist only for a private mirror or a private
# re-publish of the images: point image.registry at your mirror, then either set
# imagePullSecret.create=true with a real dockerconfigjson, or pre-create the
# secret out of band and list it under imagePullSecrets below.
imagePullSecret:
  # When true, the chart renders the dockerconfigjson Secret named below. When
  # false (the default), no Secret is rendered; public images need none.
  create: false
  # The Secret name rendered when create=true. Add the same name to
  # imagePullSecrets below for the workloads to use it.
  name: ghcr-pull
  # The base64-encoded dockerconfigjson value. Defaults to {"auths":{}}. Provide
  # a real credential when create=true to enable pulls from a private mirror.
  dockerconfigjson: eyJhdXRocyI6e319

# Image pull secret names attached to every workload pod spec. Empty by default:
# the published images are public, so no secret is referenced and a fresh install
# emits no "Unable to retrieve some image pull secrets" warning event. Populate
# this only for a private mirror, for example: [{name: ghcr-pull}].
imagePullSecrets: []

# Extra labels merged onto every resource the chart renders.
commonLabels: {}

# Durable persistence for the hosted/self-hosted SaaS front door (the console BFF
# and the public gateway): accounts, organizations, memberships, and API keys.
# This is the durability foundation; without it those records live only in memory
# and are lost on every restart.
#
# Bring your own managed Postgres (RDS, Cloud SQL, Neon, Supabase, and so on).
# The chart does NOT bundle a database for the production path: a bundled,
# single-replica Postgres would be a data-loss footgun, and a managed database is
# the right operational choice. You supply the connection string out of band as a
# Kubernetes Secret and reference it here. For example:
#
#   kubectl create secret generic mitos-db \
#     --namespace mitos-system \
#     --from-literal=dsn='postgres://mitos:PASSWORD@db.example.com:5432/mitos?sslmode=require'
#
# then set database.dsnSecretRef.name=mitos-db. The DSN is injected into the
# gateway and console pods via a secretKeyRef (env valueFrom), never as a
# plaintext value in the rendered manifests, so the password is not exposed in
# `helm get values`, `kubectl get deploy -o yaml`, or chart output.
database:
  # Reference an existing Secret holding the Postgres DSN. Empty disables durable
  # persistence: the gateway and console fall back to in-memory storage, which is
  # DEV ONLY (all accounts, orgs, memberships, and API keys are lost on restart).
  dsnSecretRef:
    # Name of the Secret in the release namespace. Empty disables persistence.
    name: ""
    # Key within that Secret holding the postgres://user:pass@host:5432/db DSN.
    key: "dsn"

# Console (Deployment): the hosted/self-hosted web console (issue #214). The BFF
# plus the embedded SPA, served by cmd/console. ONE image and ONE bundle serve
# BOTH editions; behavior is driven entirely by the capabilities below, which the
# binary advertises at GET /console/capabilities. Self-host runs the defaults
# (community); the hosted SaaS installs the same chart with edition=hosted.
console:
  # Render the console Deployment, Service, (optional) Ingress, ServiceAccount,
  # and RBAC.
  enabled: true
  # "community" (self-hosted default) or "hosted" (our SaaS). No build-time fork;
  # this is a runtime value.
  edition: community
  image:
    repository: mitos-console
    tag: ""
    pullPolicy: IfNotPresent
  # Console replicas. The OIDC login flow keeps session and OIDC-state per-pod in
  # memory with no shared backing, so multiple replicas behind one Service break
  # login: /auth/login and /auth/callback can land on different pods and the state
  # no longer matches (#427). Default to 1; running more than one for HA requires a
  # shared session store first (sticky sessions or a backed store).
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  # Self-serve org signup. Defaults OFF (waitlist mode). Per the #208 hard gate,
  # public self-serve untrusted multi-tenancy does not switch on until the
  # production gates pass; this is server-controlled, never a client flag.
  signup: false
  # Browser-session OIDC. Self-host points this at the operator's issuer
  # (Dex/Keycloak/Google); hosted points it at our IdP.
  oidc:
    issuerURL: ""
    clientID: ""
    # Name of an existing Secret with key "client-secret". Empty omits it.
    clientSecretRef: ""
    # The OAuth redirect_uri the console sends to the IdP and that the IdP must
    # have registered. The console mounts its callback at /auth/callback, so this
    # is normally https://<console-host>/auth/callback. Empty omits the env var
    # (installs without OIDC are unaffected); when OIDC is configured this MUST be
    # set or the login flow fails with an empty redirect_uri.
    redirectURL: ""
  # Extra env vars appended verbatim to the console container, for env the chart
  # does not model (mirrors controller.extraEnv).
  extraEnv: []
  # Secret-store providers advertised in capabilities and wired into the binary.
  secrets:
    kube:
      # The kube provider materializes org secrets as org-namespaced Secrets.
      enabled: true
    openbao:
      # The OpenBao (or Vault) external provider.
      enabled: false
      address: ""
      # Per-tenant isolation: "path" (KV path prefix + per-org policy) or
      # "namespace" (one OpenBao namespace per org).
      perOrg: path
  billing:
    # Billing surface. Hosted sets true; community keeps it off so the billing
    # routes never mount. The provider is selected by configuration: Paddle (our
    # Merchant of Record, which is the legal seller and handles global
    # sales-tax/VAT) is used when paddle.apiKeySecretRef and
    # paddle.webhookSecretRef are both set; otherwise the Stripe default applies.
    enabled: false
    # Paddle (Merchant of Record) configuration. The API key and webhook signing
    # secret are SECRETS and are injected ONLY via secretKeyRef (env valueFrom),
    # never as plaintext values in the rendered manifests. Create the Secret out
    # of band, for example:
    #
    #   kubectl create secret generic mitos-paddle \
    #     --namespace mitos-system \
    #     --from-literal=api-key='pdl_live_...' \
    #     --from-literal=webhook-secret='pdl_ntfset_...'
    #
    # then set both refs below to name=mitos-paddle. When either ref is unset the
    # Paddle env is not rendered and the billing default (Stripe) applies.
    paddle:
      # Reference an existing Secret holding the Paddle Billing API key.
      apiKeySecretRef:
        # Name of the Secret in the release namespace. Empty omits the env.
        name: ""
        # Key within that Secret holding the Paddle API key.
        key: "api-key"
      # Reference an existing Secret holding the Paddle webhook signing secret.
      webhookSecretRef:
        # Name of the Secret in the release namespace. Empty omits the env.
        name: ""
        # Key within that Secret holding the webhook signing secret.
        key: "webhook-secret"
      # Paddle API host. Default is live; set to https://sandbox-api.paddle.com
      # for the sandbox. Empty uses the binary's built-in live default.
      baseURL: ""
  # Public self-serve onboarding (issue #215): the unauthenticated signup +
  # verify endpoints and the verification email. The public endpoints are mounted
  # only when console.signup is true (the #208 gate); this block configures HOW
  # the verification email is delivered and WHETHER a verified signup provisions
  # the per-org tenant namespace.
  onboarding:
    # The base URL the verification link points at. The console appends the
    # one-time token as a ?token= query parameter. Normally
    # https://<console-host>/auth/verify. Required when SMTP is configured.
    verifyURL: ""
    # When true, a verified signup creates the cluster-scoped Org custom resource,
    # which the controller's OrgReconciler turns into a per-org namespace. Requires
    # controller.orgTenancy.enabled and the console orgs RBAC (rendered below when
    # this is on). When false (default), a verified signup creates the account and
    # org in the store but provisions no namespace.
    clusterProvisioning: false
    # SMTP delivery for the verification email. host/port/from are plain config;
    # the username and password are sourced from a Secret ONLY (never inlined).
    # When smtp.host is empty the console uses the DEV log sender (no real email is
    # delivered) and logs that mode at startup.
    smtp:
      host: ""
      port: 587
      from: ""
      # Name of an existing Secret holding the SMTP credentials. The username is
      # read from key "username" and the password from key "password". Empty omits
      # the auth env entirely (the console then uses the dev log sender unless host
      # is set with anonymous relay, which is uncommon). The password VALUE is
      # never placed in the chart or in a plain env var.
      credentialsSecretRef: ""
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}

# Gateway (Deployment): the public customer API front door (issue #210) -- API-key
# auth, org resolution, quota, and forwarding to the control plane. The
# programmatic counterpart to the console.
gateway:
  enabled: true
  image:
    repository: mitos-gateway
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 2
  # Abuse-control enforcement (quotas, rate limits, and the kill-switch). Default
  # on for the hosted profile: a public multi-tenant front door must enforce
  # per-org quotas, per-org and per-IP rate limits, the per-sandbox size cap, and
  # the abuse/billing kill-switch before forwarding. Set enabled to false ONLY for
  # a trusted single-tenant deployment; the bypass is logged at startup.
  enforce:
    enabled: true
    # Number of trusted reverse-proxy hops in front of the gateway, used to resolve
    # the client IP for the per-IP rate limit. 0 (the default) does NOT trust
    # X-Forwarded-For and keys on the connection RemoteAddr. Set to the count of
    # trusted proxies (for example 1 behind a single ingress) so the per-IP limit
    # keys on the real client; a too-short or spoofed X-Forwarded-For fails closed
    # to RemoteAddr.
    trustedProxyHops: 0
    # CAVEAT: the suspension (kill-switch) store is in-process for this slice, so a
    # suspension does not survive a restart and is not shared across replicas. Run a
    # single gateway replica for the kill-switch to be authoritative, or re-drive the
    # abuse/billing signals after a restart, until the durable store follow-up lands.
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  # Single-tenant namespace override. When non-empty, the gateway pins all
  # sandbox create/status/list/terminate/proxy operations to this fixed
  # namespace instead of the per-org mitos-org-<id> namespace. Use for QA
  # deployments where per-org namespaces are not provisioned and a shared
  # SandboxPool already exists in this namespace (e.g. "mitos"). Default
  # empty (per-org namespacing, the production path). Org-label authz is
  # preserved regardless: a key for org B cannot read or mutate org A's
  # sandbox even in a shared namespace.
  singleTenantNamespace: ""
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}

# Product telemetry: a privacy-first, OPT-IN, OFF-BY-DEFAULT pipeline that emits
# a small set of non-PII product-usage events (sandbox.created, signup.started,
# signup.verified) from the gateway and console. See docs/telemetry.md for the
# exact event list, the no-PII guarantee, and the DO_NOT_TRACK behavior.
#
# Privacy contract enforced here:
#   - Disabled unless enabled=true AND endpoint is set. With either missing the
#     binary fails closed to a no-op emitter.
#   - DO_NOT_TRACK is honored by the binary: a DO_NOT_TRACK=1 env (or
#     telemetry.optOut=true here) force-disables telemetry regardless of the rest.
#   - The org id is sent ONLY as a salted hash; with no salt the id is dropped.
#     The salt and any endpoint token are SECRETS, injected via secretKeyRef ONLY,
#     never as plaintext in the rendered manifests.
telemetry:
  # Opt-in switch. Default false: no telemetry env is rendered and the binaries
  # run with a no-op emitter.
  enabled: false
  # Force-disable even if enabled=true (an explicit per-deploy opt-out). The
  # binary also honors a DO_NOT_TRACK=1 env independently of this.
  optOut: false
  # The collector endpoint the network sink POSTs JSON to (for example a PostHog,
  # Segment-compatible, or custom ingest URL). REQUIRED when enabled; an empty
  # endpoint keeps telemetry disabled (fail closed).
  endpoint: ""
  # The HMAC salt used to hash the org id, sourced from a Secret. With no salt the
  # org id is DROPPED from every event. Create the Secret out of band, for
  # example:
  #
  #   kubectl create secret generic mitos-telemetry \
  #     --namespace mitos-system \
  #     --from-literal=salt='<random-32-bytes>' \
  #     --from-literal=token='<optional-collector-token>'
  #
  # then set saltSecretRef.name=mitos-telemetry below.
  saltSecretRef:
    # Name of the Secret in the release namespace. Empty omits the salt env, so
    # the org id is dropped (fail closed).
    name: ""
    # Key within that Secret holding the salt.
    key: "salt"
  # Optional bearer token for the collector, sourced from a Secret. Empty omits
  # the Authorization header.
  tokenSecretRef:
    # Name of the Secret in the release namespace. Empty omits the token env.
    name: ""
    # Key within that Secret holding the token.
    key: "token"

# Expose proxy (Deployment): cmd/preview-proxy terminates TLS for wildcard
# sandbox preview URLs and proxies traffic to the correct sandbox. Gated by
# expose.enabled (default false). Requires expose.domain when enabled.
expose:
  # Gate the expose-proxy Deployment, Service, and optional Ingress/Certificate.
  enabled: false
  image:
    # Image repository for the preview proxy (appended to image.registry).
    repository: preview-proxy
    # Image tag. Defaults to the chart appVersion via mitos.image when empty.
    tag: ""
    # Image pull policy for the proxy container.
    pullPolicy: IfNotPresent
  # Number of proxy replicas.
  replicas: 1
  # The expose domain, e.g. mitos.app. Required when expose.enabled is true.
  domain: ""
  service:
    # Service type: ClusterIP (default) or LoadBalancer.
    type: ClusterIP
  ingress:
    # Gate the Ingress resource for the expose proxy.
    enabled: false
    # ingressClassName for the Ingress.
    className: ""
    # Annotations applied to the Ingress resource.
    annotations: {}
  tls:
    # certManager issues a wildcard *.<domain> Certificate via the named issuer.
    certManager:
      # When true, renders a cert-manager Certificate for the wildcard domain.
      enabled: false
      issuerRef:
        # Name of the ClusterIssuer or Issuer.
        name: ""
        # Kind of the issuer reference: ClusterIssuer or Issuer.
        kind: ClusterIssuer
    # secretName is the TLS Secret mounted into the proxy at /tls. Created by
    # cert-manager when certManager.enabled, or provided by the operator otherwise.
    secretName: mitos-expose-tls
  # Name of the Secret holding signing-secret and admin-token keys shared by the
  # proxy and the controller. If absent from the cluster, create it out of band.
  # The operator MUST populate this Secret with the following keys before enabling
  # expose or expose.oidc:
  #   signing-secret      (MITOS_PREVIEW_SECRET: at least 16 random bytes)
  #   admin-token         (MITOS_EXPOSE_ADMIN_TOKEN: at least 16 random bytes)
  #   grant-secret        (MITOS_EXPOSE_GRANT_SECRET: at least 16 random bytes; 32 recommended, OIDC only)
  #   session-secret      (MITOS_EXPOSE_SESSION_SECRET: at least 16 random bytes; 32 recommended, OIDC only)
  #   sso-secret          (MITOS_EXPOSE_SSO_SECRET: at least 16 random bytes; 32 recommended, OIDC only)
  #   state-secret        (MITOS_EXPOSE_STATE_SECRET: at least 16 random bytes; 32 recommended, OIDC only)
  #   oidc-client-secret  (MITOS_EXPOSE_OIDC_CLIENT_SECRET: from your IdP, OIDC only)
  #   resolve-token       (MITOS_EXPOSE_RESOLVE_TOKEN / MITOS_IDENTITY_RESOLVE_TOKEN:
  #                        shared between the proxy and the console; at least 16 random bytes; 32 recommended)
  # Secret VALUES are NEVER inlined in the chart; they are always mounted via
  # secretKeyRef. Generate and apply the Secret out of band:
  #   kubectl create secret generic mitos-expose -n mitos \
  #     --from-literal=signing-secret=<...> --from-literal=admin-token=<...> \
  #     --from-literal=grant-secret=<...> --from-literal=session-secret=<...> \
  #     --from-literal=sso-secret=<...> --from-literal=state-secret=<...> \
  #     --from-literal=oidc-client-secret=<...> --from-literal=resolve-token=<...>
  secretName: mitos-expose
  # OIDC relying-party configuration for the central auth.<expose-domain> origin.
  # When oidc.issuer is empty the proxy runs in token-only/public mode and the
  # private/org/authenticated tiers return 401. Requires expose.enabled true.
  oidc:
    # OIDC discovery issuer URL (e.g. https://accounts.google.com or
    # https://dex.example.com). Empty disables OIDC.
    issuer: ""
    # OIDC client ID registered at the issuer.
    clientID: ""
  # Identity resolve endpoint: the in-cluster console service that maps a verified
  # email to org IDs. Used by the private and org sharing tiers. The resolve token
  # is a SHARED secret between the proxy (MITOS_EXPOSE_RESOLVE_TOKEN) and the
  # console (MITOS_IDENTITY_RESOLVE_TOKEN); both read it from the same Secret key
  # (expose.secretName, key resolve-token). When resolveURL is empty the resolve
  # hop is skipped and the proxy falls back to OIDC claims/forwardAuth.
  identityResolve:
    # URL of the resolve endpoint. Default points at the in-cluster console
    # Service. Override if your console runs in a different namespace or port.
    resolveURL: ""
  # Proxy container resource requests and limits.
  resources: {}

# Dex in-cluster OIDC federator: federates GitHub and Google into a single
# OIDC issuer the console trusts. Gated by dex.enabled (default false).
#
# When dex.enabled is true, wire the console by setting:
#   console.oidc.issuerURL    = <dex.issuer>
#   console.oidc.clientID     = <dex.console.clientID>
#   console.oidc.clientSecretRef = <dex.consoleClientSecret>
#     (the console reads key "client-secret" from that Secret)
#
# Required Secrets (create out of band before enabling):
#
#   kubectl create secret generic <dex.connectorsSecret> \
#     --namespace <release-namespace> \
#     --from-literal=github-client-id='...' \
#     --from-literal=github-client-secret='...' \
#     --from-literal=google-client-id='...' \
#     --from-literal=google-client-secret='...'
#
#   kubectl create secret generic <dex.consoleClientSecret> \
#     --namespace <release-namespace> \
#     --from-literal=client-secret='<shared-random-secret>'
#
# Set console.oidc.clientSecretRef to this same Secret name. Both Dex
# (as the static-client secret) and the console (as its OIDC client secret)
# read key "client-secret" from that Secret, so one Secret with one key
# satisfies both sides. No secret value is ever inlined in this chart.
# Secret VALUES are NEVER inlined in this chart; all are sourced via
# secretKeyRef and Dex's native $VAR expansion in the config file.
dex:
  # Gate the Dex ConfigMap, Deployment, and Service. Default false (opt-in).
  enabled: false
  # Pinned Dex image. Dex v2.35+ supports $VAR expansion in config.yaml;
  # v2.41.1 is the version validated for this chart.
  image: ghcr.io/dexidp/dex:v2.41.1
  # OIDC issuer URL Dex advertises. Must match the ingress path Dex is
  # reachable at. The console trusts this as console.oidc.issuerURL.
  issuer: https://mitos.run/dex
  # Static OIDC client registered in Dex for the console.
  console:
    # OIDC client ID. Set console.oidc.clientID to the same value.
    clientID: mitos-console
    # The OAuth redirect_uri Dex registers for the console. Must match
    # console.oidc.redirectURL and be registered in your GitHub/Google OAuth
    # apps as an authorized redirect URI.
    redirectURL: https://mitos.run/auth/callback
  # Name of an existing Secret holding the GitHub and Google OAuth credentials.
  # Required keys: github-client-id, github-client-secret,
  #                google-client-id, google-client-secret.
  # Create this Secret out of band (see comment block above). Empty string
  # is not valid when dex.enabled is true.
  connectorsSecret: ""
  # Name of an existing Secret holding the console static-client secret.
  # Required key: client-secret.
  # Set console.oidc.clientSecretRef to this same Secret name. Both Dex and
  # the console read key "client-secret" from this Secret, so one Secret with
  # one key satisfies both sides. Create out of band (see comment block above).
  consoleClientSecret: ""

# Front-door reverse proxy (Deployment + Service): single-origin entry point at
# mitos.run. Routes / to the marketing static site and /app + auth paths to the
# console. Gated by frontdoor.enabled (default false). Requires the expose
# Secret (expose.secretName) to be present in the cluster with a resolve-token
# key before enabling, because MITOS_IDENTITY_RESOLVE_TOKEN is sourced from it.
frontdoor:
  # Gate the frontdoor Deployment and Service. Default false (opt-in).
  enabled: false
  # Number of frontdoor replicas.
  replicas: 2
  image:
    # Image repository for the front-door (appended to image.registry).
    # Set to the frontdoor binary OCI repository before enabling.
    repository: ""
    # Image tag. Defaults to the chart appVersion via mitos.image when empty.
    tag: ""
    # Image pull policy for the frontdoor container.
    pullPolicy: IfNotPresent
  # In-cluster URL of the marketing static-site Service. Defaults to the
  # mitos-marketing Service constructed from the release namespace.
  marketingURL: ""
  # In-cluster URL of the console Service. Defaults to the mitos-console
  # Service constructed from the release namespace.
  consoleURL: ""
  # In-cluster URL of the console session-resolve endpoint. Defaults to the
  # mitos-console Service path /internal/session/resolve.
  sessionResolveURL: ""
  # GitHub Pages anycast IP:port addresses for the marketing upstream. When
  # non-empty, the frontdoor dials one of these IPs instead of resolving
  # mitos.run via DNS; TLS SNI and the upstream Host header remain mitos.run.
  # Default empty (in-cluster mode: DNS resolves to the marketing Deployment).
  # Production (GitHub Pages hosting):
  #   ["185.199.108.153:443","185.199.109.153:443","185.199.110.153:443","185.199.111.153:443"]
  marketingPagesAddrs: []
  # Frontdoor container resource requests and limits.
  resources: {}

# Cilium Gateway-API edge resources for mitos.run (Gateway, Certificate,
# HTTPRoutes, CiliumNetworkPolicy). Uses the "edge" values key to avoid
# collision with the existing gateway.yaml (cmd/gateway API front door,
# gated by gateway.enabled). Gated by edge.enabled (default false).
# Live gateway, DNS, and TLS are verified on the cluster via the paperclip
# deploy, not by local helm template lint.
edge:
  # Gate all edge-gateway resources. Default false (opt-in).
  enabled: false
  # GatewayClass name used by the Cilium Gateway-API integration.
  gatewayClassName: cilium
  # Primary hostname for the edge gateway and certificate.
  hostname: mitos.run
  tls:
    # Name of the TLS Secret created by cert-manager and referenced by the
    # Gateway listener.
    secretName: mitos-run-tls
    issuerRef:
      # Name of the cert-manager ClusterIssuer or Issuer.
      name: letsencrypt-prod
      # Kind of the issuer reference: ClusterIssuer or Issuer.
      kind: ClusterIssuer

# Marketing static site (Deployment + Service): serves the Astro-built public
# marketing pages at the root path forwarded by the front-door. Gated by
# marketing.enabled (default false). The production OCI image is built from
# github.com/mitos-run/website; wiring that build into this field is a
# follow-up integration task.
marketing:
  # Gate the marketing Deployment and Service. Default false (opt-in).
  enabled: false
  # Number of marketing replicas.
  replicas: 1
  # Full OCI image reference for the marketing static site. Required when
  # marketing.enabled is true. Use "nginxinc/nginx-unprivileged:latest" as a
  # staging placeholder; replace with the production Astro dist image from the
  # website repo CI once available.
  image: ""
  # Marketing container resource requests and limits.
  resources: {}
