---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: sandboxpools.mitos.run
spec:
  group: mitos.run
  names:
    kind: SandboxPool
    listKind: SandboxPoolList
    plural: sandboxpools
    singular: sandboxpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readySnapshots
      name: Ready
      type: integer
    - jsonPath: .spec.replicas
      name: Desired
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              autoscale:
                description: |-
                  Autoscale turns the warm pool from a fixed Replicas pre-fill into a
                  demand-driven autoscaler: it scales the number of DORMANT husk pods up
                  under claim pressure and back down to a floor after an idle cooldown.
                  When nil the pool keeps exactly the legacy behavior (the warm pool is held
                  at Replicas). When set, the desired dormant count is
                  clamp(inUse + targetSpare, minWarm, maxWarm) and Replicas is ignored for
                  warm-pool sizing (it stays the scale-subresource target for back-compat).
                properties:
                  maxWarm:
                    description: |-
                      MaxWarm is the ceiling: the dormant pod count is never driven above this,
                      regardless of demand, so a burst cannot create unbounded pods. Required
                      when autoscaling is enabled.
                    format: int32
                    minimum: 1
                    type: integer
                  minWarm:
                    default: 0
                    description: |-
                      MinWarm is the floor: the dormant pod count the pool holds when fully idle.
                      Operators who want the legacy fixed pool set MinWarm equal to Replicas.
                    format: int32
                    minimum: 0
                    type: integer
                  scaleDownCooldownSeconds:
                    default: 300
                    description: |-
                      ScaleDownCooldownSeconds is the anti-thrash window: after the pool reduces
                      the dormant count it will not reduce it again until this many seconds have
                      elapsed with NO claim arrival. Scale UP is never delayed. Default 300.
                    format: int32
                    minimum: 0
                    type: integer
                  targetSpare:
                    default: 2
                    description: |-
                      TargetSpare is the headroom kept on top of the current in-use count: the
                      pool aims to always have this many SPARE dormant pods ready, so a claim
                      burst up to TargetSpare within one reconcile interval hits a ready dormant
                      pod instead of cold-starting. Default 2.
                    format: int32
                    minimum: 0
                    type: integer
                required:
                - maxWarm
                type: object
              cpuPinning:
                description: |-
                  CPUPinning configures dynamic (post-ready) CPU pinning and a launch-time
                  scheduling-priority bump for this pool's sandbox VMs (issue #168). When nil
                  the pool keeps the default unpinned behavior: vCPU threads float across the
                  husk pod's cpuset, scheduled by the kernel. When set, after a fork's guest
                  is ready the node pins that fork's vCPU threads to specific physical cores
                  (pairing both hyperthread siblings per vCPU) per the chosen Policy, for
                  higher and more predictable density. The launch burst itself is left
                  unpinned so the kernel can spread it across cores; pinning is applied only
                  AFTER guest-ready. The pin stays inside the husk pod's cpuset, so it never
                  regresses the husk pod cgroup model or the CoW memcg accounting (issue #33).
                properties:
                  enabled:
                    default: false
                    description: |-
                      Enabled turns dynamic post-ready CPU pinning on for this pool. When false
                      (the default) vCPU threads float across the husk pod cpuset and nothing is
                      pinned, exactly the legacy behavior.
                    type: boolean
                  launchRtPriority:
                    default: true
                    description: |-
                      LaunchRtPriority bumps the Firecracker vCPU threads to an elevated (real
                      time) scheduling priority during the activate window, then drops them back
                      after guest-ready, to cut launch loss under a claim storm. Defaults to true.
                    type: boolean
                  policy:
                    default: pack
                    description: |-
                      Policy is the packing strategy used when computing the pin plan after
                      guest-ready. Pack consolidates forks onto as few physical cores as possible
                      for maximum density, never letting two tenants share a physical core. Spread
                      distributes forks across distinct physical cores for lower contention. Only
                      consulted when Enabled is true.
                    enum:
                    - spread
                    - pack
                    type: string
                  siblingPairing:
                    default: true
                    description: |-
                      SiblingPairing assigns both hyperthread siblings of a physical core to the
                      same vCPU, so a vCPU thread and its sibling never serve two different
                      tenants. Defaults to true; set false on a node with hyperthreading disabled
                      or to pin per-logical-CPU.
                    type: boolean
                type: object
              drainPolicy:
                default: Kill
                description: |-
                  DrainPolicy governs an active sandbox (a claim that activated a husk pod)
                  when that husk pod is lost (drain, eviction, deletion). Kill (the default)
                  re-pends the claim onto a replacement dormant slot. Checkpoint attempts a
                  live-VM snapshot first where the VMM still runs, then re-pends. Only used
                  in husk mode.
                enum:
                - Kill
                - Checkpoint
                type: string
              placement:
                description: |-
                  Placement pins this pool's husk pods (and therefore the sandbox VMs they
                  run) to a dedicated set of nodes, for hard tenant separation (issue #172).
                  It is a generic nodeSelector + tolerations: an operator labels/taints a node
                  pool for a tenant and sets the matching Placement here. The selector is
                  ANDed onto the husk pod's existing KVM nodeSelector and snapshot-node
                  affinity, so the dedicated nodes MUST be KVM nodes that hold the pool's
                  template snapshot. Kubernetes provides the scheduling; the operator provides
                  the physically dedicated nodes (see docs/superpowers/plans/2026-06-18-dedicated-nodes.md).
                properties:
                  nodeSelector:
                    additionalProperties:
                      type: string
                    description: |-
                      NodeSelector is ANDed onto the husk pod so its sandbox VMs run only on
                      nodes carrying these labels.
                    type: object
                  tolerations:
                    description: Tolerations let the husk pods schedule onto tainted
                      dedicated nodes.
                    items:
                      description: |-
                        The pod this Toleration is attached to tolerates any taint that matches
                        the triple <key,value,effect> using the matching operator <operator>.
                      properties:
                        effect:
                          description: |-
                            Effect indicates the taint effect to match. Empty means match all taint effects.
                            When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                          type: string
                        key:
                          description: |-
                            Key is the taint key that the toleration applies to. Empty means match all taint keys.
                            If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                          type: string
                        operator:
                          description: |-
                            Operator represents a key's relationship to the value.
                            Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                            Exists is equivalent to wildcard for value, so that a pod can
                            tolerate all taints of a particular category.
                            Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                          type: string
                        tolerationSeconds:
                          description: |-
                            TolerationSeconds represents the period of time the toleration (which must be
                            of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                            it is not set, which means tolerate the taint forever (do not evict). Zero and
                            negative values will be treated as 0 (evict immediately) by the system.
                          format: int64
                          type: integer
                        value:
                          description: |-
                            Value is the taint value the toleration matches to.
                            If the operator is Exists, the value should be empty, otherwise just a regular string.
                          type: string
                      type: object
                    type: array
                type: object
              replicas:
                format: int32
                type: integer
              scaleDownAfterSnapshot:
                description: Whether to scale down the source sandbox after snapshot.
                type: boolean
              snapshotAfter:
                type: string
              snapshotDelay:
                description: |-
                  Delay after the trigger condition before taking the snapshot.
                  Allows init scripts to finish.
                type: string
              snapshotStorage:
                description: Where to store snapshot artifacts on the node.
                type: string
              templateRef:
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
            required:
            - replicas
            - templateRef
            type: object
          status:
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              desiredWarm:
                description: |-
                  DesiredWarm is the autoscaler's computed desired dormant pod count as of
                  the last reconcile. Equal to Replicas when autoscaling is off. Observability
                  only; mirrors the mitos_pool_desired_warm gauge.
                format: int32
                type: integer
              lastScaleDownTime:
                description: |-
                  LastScaleDownTime records when the pool last reduced its dormant pod count,
                  so an operator can see the scale-down cooldown state.
                format: date-time
                type: string
              lastSnapshotTime:
                format: date-time
                type: string
              nodeDistribution:
                additionalProperties:
                  format: int32
                  type: integer
                type: object
              readySnapshots:
                format: int32
                type: integer
              restoringCount:
                format: int32
                type: integer
              templateDigest:
                description: |-
                  TemplateDigest is the content-addressed manifest digest of the pool's
                  snapshot, as reported by the node(s) holding it. It makes the snapshot
                  identity visible in the CRD so integrity can be audited. A content
                  address, safe to log.
                type: string
              totalSnapshots:
                format: int32
                type: integer
            required:
            - readySnapshots
            - restoringCount
            - totalSnapshots
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      scale:
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.readySnapshots
      status: {}
  - additionalPrinterColumns:
    - jsonPath: .status.readySnapshots
      name: Ready
      type: integer
    - jsonPath: .spec.template.image
      name: Image
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          SandboxPool is the v1alpha2 (consolidated) pool kind. It inlines the former
          SandboxTemplate into spec.template (ADR 0007); spec.templateRef survives as
          the optional reuse alternative (the Deployment-embeds-PodSpec pattern). A pool
          sets EXACTLY ONE of spec.template or spec.templateRef.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Spec is the desired pool configuration: the template (inline or by
              reference), the snapshot fan-out, the warm-pod autoscaler, and placement.
            properties:
              cpuPinning:
                description: |-
                  CPUPinning configures dynamic post-ready CPU pinning and a launch-time
                  scheduling-priority bump for this pool's sandbox VMs (issue #168). Carried
                  unchanged from v1alpha1.
                properties:
                  enabled:
                    default: false
                    description: |-
                      Enabled turns dynamic post-ready CPU pinning on for this pool. When false
                      (the default) vCPU threads float across the husk pod cpuset and nothing is
                      pinned, exactly the legacy behavior.
                    type: boolean
                  launchRtPriority:
                    default: true
                    description: |-
                      LaunchRtPriority bumps the Firecracker vCPU threads to an elevated (real
                      time) scheduling priority during the activate window, then drops them back
                      after guest-ready, to cut launch loss under a claim storm. Defaults to true.
                    type: boolean
                  policy:
                    default: pack
                    description: |-
                      Policy is the packing strategy used when computing the pin plan after
                      guest-ready. Pack consolidates forks onto as few physical cores as possible
                      for maximum density, never letting two tenants share a physical core. Spread
                      distributes forks across distinct physical cores for lower contention. Only
                      consulted when Enabled is true.
                    enum:
                    - spread
                    - pack
                    type: string
                  siblingPairing:
                    default: true
                    description: |-
                      SiblingPairing assigns both hyperthread siblings of a physical core to the
                      same vCPU, so a vCPU thread and its sibling never serve two different
                      tenants. Defaults to true; set false on a node with hyperthreading disabled
                      or to pin per-logical-CPU.
                    type: boolean
                type: object
              drainPolicy:
                default: Kill
                description: |-
                  DrainPolicy governs an active sandbox when its backing husk pod is lost
                  (drain, eviction, deletion). Kill (the default) re-pends the sandbox onto a
                  replacement dormant slot; Checkpoint attempts a live-VM snapshot first where
                  the VMM still runs, then re-pends. Carried unchanged from v1alpha1.
                enum:
                - Kill
                - Checkpoint
                type: string
              placement:
                description: |-
                  Placement pins this pool's husk pods (and the sandbox VMs they run) to a
                  dedicated set of nodes for hard tenant separation (issue #172). Carried
                  unchanged from v1alpha1.
                properties:
                  nodeSelector:
                    additionalProperties:
                      type: string
                    description: |-
                      NodeSelector is ANDed onto the husk pod so its sandbox VMs run only on
                      nodes carrying these labels.
                    type: object
                  tolerations:
                    description: Tolerations let the husk pods schedule onto tainted
                      dedicated nodes.
                    items:
                      description: |-
                        The pod this Toleration is attached to tolerates any taint that matches
                        the triple <key,value,effect> using the matching operator <operator>.
                      properties:
                        effect:
                          description: |-
                            Effect indicates the taint effect to match. Empty means match all taint effects.
                            When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                          type: string
                        key:
                          description: |-
                            Key is the taint key that the toleration applies to. Empty means match all taint keys.
                            If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                          type: string
                        operator:
                          description: |-
                            Operator represents a key's relationship to the value.
                            Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                            Exists is equivalent to wildcard for value, so that a pod can
                            tolerate all taints of a particular category.
                            Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                          type: string
                        tolerationSeconds:
                          description: |-
                            TolerationSeconds represents the period of time the toleration (which must be
                            of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                            it is not set, which means tolerate the taint forever (do not evict). Zero and
                            negative values will be treated as 0 (evict immediately) by the system.
                          format: int64
                          type: integer
                        value:
                          description: |-
                            Value is the taint value the toleration matches to.
                            If the operator is Exists, the value should be empty, otherwise just a regular string.
                          type: string
                      type: object
                    type: array
                type: object
              snapshots:
                description: |-
                  Snapshots configures the per-node snapshot fan-out: how many warm snapshot
                  restores each node holds, the prefetch posture, and the refresh schedule.
                  It folds the v1alpha1 snapshotAfter, snapshotDelay, scaleDownAfterSnapshot,
                  and snapshotStorage fields into one block.
                properties:
                  prefetch:
                    description: |-
                      Prefetch is the snapshot prefetch posture (for example "full"): how much of
                      the snapshot is pulled onto a node before it is considered ready.
                    type: string
                  refresh:
                    description: |-
                      Refresh schedules a periodic snapshot rebuild (for example a nightly cron),
                      so a pool's snapshots track a moving base image. NEW v2 surface; empty
                      leaves snapshots fixed until the template changes.
                    properties:
                      schedule:
                        description: Schedule is a cron expression (for example "0
                          4 * * *") for the rebuild.
                        type: string
                    type: object
                  replicasPerNode:
                    description: |-
                      ReplicasPerNode is the number of warm snapshot restores each holder node
                      keeps. It carries the v1alpha1 spec.replicas value on conversion.
                    format: int32
                    minimum: 0
                    type: integer
                  scaleDownAfterSnapshot:
                    description: |-
                      ScaleDownAfterSnapshot scales down the source sandbox after the snapshot is
                      taken. Re-homed from v1alpha1 spec.scaleDownAfterSnapshot.
                    type: boolean
                  snapshotAfter:
                    description: |-
                      SnapshotAfter is the trigger condition before a snapshot is taken (for
                      example Ready). Re-homed from v1alpha1 spec.snapshotAfter.
                    type: string
                  snapshotDelay:
                    description: |-
                      SnapshotDelay is the delay after the trigger before the snapshot is taken,
                      allowing init scripts to finish. Re-homed from v1alpha1 spec.snapshotDelay.
                    type: string
                  storage:
                    description: |-
                      Storage is where snapshot artifacts are stored on the node. Re-homed from
                      v1alpha1 spec.snapshotStorage.
                    type: string
                type: object
              template:
                description: |-
                  Template is the inline pool template carrying every field a v1alpha1
                  SandboxTemplate carried (image, init, command, env, resources, volumes,
                  network, encrypted). It is the common path; mutually exclusive with
                  TemplateRef. Exactly one of Template or TemplateRef must be set.
                properties:
                  buildSteps:
                    description: |-
                      BuildSteps is the ordered, declarative build recipe (issue #220), the
                      code-first alternative to Init. Carried unchanged from v1alpha1.
                    items:
                      description: |-
                        BuildStep is one ordered step of a declarative template build (issue #220).
                        Exactly one shape is meaningful per Type. The build path flattens run, env,
                        and workdir steps into the in-VM init commands in order; copy steps are
                        staged by the file path. The whole ordered list feeds the chained,
                        content-addressed cache key so an unchanged prefix is reused.
                      properties:
                        dest:
                          type: string
                        envName:
                          description: EnvName and EnvValue are the variable name
                            and value for an env step.
                          type: string
                        envValue:
                          type: string
                        run:
                          description: Run is the shell command for a run step.
                          type: string
                        source:
                          description: |-
                            Source and Dest are the host source and in-image destination for a copy
                            step.
                          type: string
                        type:
                          description: 'Type selects the step kind: run, env, workdir,
                            or copy.'
                          enum:
                          - run
                          - env
                          - workdir
                          - copy
                          type: string
                        workdir:
                          description: Workdir is the directory for a workdir step.
                          type: string
                      required:
                      - type
                      type: object
                    type: array
                  command:
                    description: Command overrides the container entrypoint inside
                      the sandbox.
                    items:
                      type: string
                    type: array
                  defaultBudget:
                    description: |-
                      DefaultBudget is the pool's default capability budget inherited by a
                      Sandbox created from this pool when the Sandbox sets no budget of its own
                      (v2-spec section 3). NEW v2 surface; default empty (no budget). Runtime
                      enforcement is issue #25.
                    properties:
                      maxCheckpoints:
                        description: MaxCheckpoints bounds the self-initiated checkpoints
                          the sandbox may take.
                        format: int32
                        type: integer
                      maxCpuSeconds:
                        description: MaxCpuSeconds bounds the cumulative CPU seconds
                          the sandbox may consume.
                        format: int64
                        type: integer
                      maxEgressBytes:
                        anyOf:
                        - type: integer
                        - type: string
                        description: |-
                          MaxEgressBytes bounds the cumulative egress bytes the sandbox may send. It
                          is a Kubernetes quantity (for example "1Gi").
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      maxForks:
                        description: |-
                          MaxForks bounds the self-initiated forks (depth-aggregate) the sandbox may
                          create at runtime.
                        format: int32
                        type: integer
                      maxLifetimeExtension:
                        description: |-
                          MaxLifetimeExtension bounds the total lifetime extension the sandbox may
                          request at runtime.
                        type: string
                    type: object
                  encrypted:
                    default: false
                    description: |-
                      Encrypted requests at-rest encryption of the template snapshot and every
                      fork built from it. Carried unchanged from v1alpha1.
                    type: boolean
                  env:
                    description: Env are environment variables baked into the template
                      at build time.
                    items:
                      description: EnvVar represents an environment variable present
                        in a Container.
                      properties:
                        name:
                          description: |-
                            Name of the environment variable.
                            May consist of any printable ASCII characters except '='.
                          type: string
                        value:
                          description: |-
                            Variable references $(VAR_NAME) are expanded
                            using the previously defined environment variables in the container and
                            any service environment variables. If a variable cannot be resolved,
                            the reference in the input string will be unchanged. Double $$ are reduced
                            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                            "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                            Escaped references will never be expanded, regardless of whether the variable
                            exists or not.
                            Defaults to "".
                          type: string
                        valueFrom:
                          description: Source for the environment variable's value.
                            Cannot be used if value is not empty.
                          properties:
                            configMapKeyRef:
                              description: Selects a key of a ConfigMap.
                              properties:
                                key:
                                  description: The key to select.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the ConfigMap or its
                                    key must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                            fieldRef:
                              description: |-
                                Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                              properties:
                                apiVersion:
                                  description: Version of the schema the FieldPath
                                    is written in terms of, defaults to "v1".
                                  type: string
                                fieldPath:
                                  description: Path of the field to select in the
                                    specified API version.
                                  type: string
                              required:
                              - fieldPath
                              type: object
                              x-kubernetes-map-type: atomic
                            fileKeyRef:
                              description: |-
                                FileKeyRef selects a key of the env file.
                                Requires the EnvFiles feature gate to be enabled.
                              properties:
                                key:
                                  description: |-
                                    The key within the env file. An invalid key will prevent the pod from starting.
                                    The keys defined within a source may consist of any printable ASCII characters except '='.
                                    During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                  type: string
                                optional:
                                  default: false
                                  description: |-
                                    Specify whether the file or its key must be defined. If the file or key
