apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mitos-forkd
  namespace: mitos
  labels:
    app.kubernetes.io/name: mitos
    app.kubernetes.io/component: forkd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mitos
      app.kubernetes.io/component: forkd
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mitos
        app.kubernetes.io/component: forkd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      # forkd makes no Kubernetes API calls (it imports no client); do not mount
      # a SA token on this high-value pod.
      automountServiceAccountToken: false
      # forkd owns every VM, warm pool, and snapshot on its node; a kubelet
      # eviction (e.g. node DiskPressure) drops the whole node's fork capability.
      # Run it node-critical so it is never the pod the kubelet sheds.
      priorityClassName: system-node-critical
      # ghcr-pull so the kubelet can pull ghcr.io/mitos-run/mitos-forkd.
      imagePullSecrets:
        - name: ghcr-pull
      nodeSelector:
        mitos.run/kvm: "true"

      tolerations:
        - key: mitos.run/dedicated
          operator: Exists
          effect: NoSchedule

      containers:
        - name: forkd
          image: ghcr.io/mitos-run/mitos-forkd:latest
          args:
            - --listen=:9090
            - --data-dir=/var/lib/mitos
            - --firecracker=/usr/local/bin/firecracker
            - --kernel=/var/lib/mitos/vmlinux
            - --http=:9091
            # Dedicated token-gated TLS listener for peer template
            # distribution. It is a SEPARATE port from --http: the CAS
            # surface is served here over TLS, while the sandbox
            # exec/files/metrics/healthz API on :9091 keeps its scheme
            # unchanged so SDK clients are unaffected. Effective only
            # when FORKD_PEER_TOKEN is set (with mTLS); the controller
            # derives this port to build each holder's CAS source URL.
            - --cas-listen=:9092
            - --tls-cert=/etc/forkd/tls/tls.crt
            - --tls-key=/etc/forkd/tls/tls.key
            - --tls-ca=/etc/forkd/ca/ca.crt
            # Guest agent injected as /init for OCI image template builds. The
            # binary ships in the forkd image at this path (Dockerfile.forkd).
            - --agent-bin=/usr/local/bin/agent
            # Networking enabled so forkd bakes the eth0 placeholder NIC into every
            # husk template snapshot: husk activation network_overrides that NIC onto
            # each pod's own tap (Firecracker cannot add a NIC on restore), and the
            # in-pod egress filter governs it. forkd creates the build-time
            # placeholder tap with `ip tuntap add`, so the forkd IMAGE must carry
            # iproute2 + nftables (Dockerfile.forkd); without them the build aborted
            # with `exec: "ip": executable file not found` and produced empty
            # snapshots (the earlier regression). The runtime per-pod tap + egress
            # chain are programmed IN the husk pod by the husk-stub (NET_ADMIN in the
            # pod netns), not by forkd.
            - --enable-networking
            # Every VM (template build and raw-forkd fork) is launched through
            # the Firecracker jailer: a dedicated per-VM uid/gid from --uid-range
            # (uid 0 refused), a per-VM chroot (pivot_root) under --chroot-base,
            # and a cgroup the jailer nests under forkd's own. This is what lets
            # the securityContext below drop privileged: true for the explicit
            # jailer capability set. --chroot-base lives UNDER --data-dir so the
            # snapshot/kernel/rootfs files hard-link into each chroot on one
            # filesystem (CoW-cheap); forkd makes the base a private mount point
            # at startup so the jailer can pivot_root inside the pod.
            - --jailer=/usr/local/bin/jailer
            - --chroot-base=/var/lib/mitos/jailer
            - --uid-range=64000-64999
          # FORKD_PEER_TOKEN is the shared bearer credential a peer
          # forkd must present to pull templates from this node's CAS.
          # It is read from the ENVIRONMENT, not a flag, so it is never
          # exposed in /proc/<pid>/cmdline (it is a credential). The
          # controller reads the SAME FORKD_PEER_TOKEN. Set it via a
          # Secret to enable the token-gated TLS CAS listener; left
          # unset, CAS distribution stays disabled. Example:
          # env:
          #   - name: FORKD_PEER_TOKEN
          #     valueFrom:
          #       secretKeyRef:
          #         name: mitos-peer-token
          #         key: token
          env:
            # forkd authenticates to ghcr/private registries when pulling OCI
            # template images. DOCKER_CONFIG points at the mounted docker-config
            # secret (the docker-config volume below). Unset = anonymous pulls.
            - name: DOCKER_CONFIG
              value: /etc/forkd/docker
          ports:
            - name: grpc
              containerPort: 9090
            - name: metrics
              containerPort: 9091
            # Dedicated token-gated TLS CAS listener (--cas-listen) for
            # peer template distribution; separate from the sandbox API.
            - name: cas
              containerPort: 9092
          # NOT privileged. forkd is the privileged BUILDER concentrated to the
          # explicit builder capability set, not a privileged-and-long-lived
          # daemon: it drops ALL capabilities and adds back ONLY the seven the
          # builder needs (cmd/forkd/jailer.go forkdRequiredCapabilities, the
          # single source of truth: the five jailer caps plus NET_ADMIN and
          # DAC_OVERRIDE):
          #   - SYS_ADMIN: mount(2) for the chroot-base pivot setup, plus the
          #     jailer's cgroup and namespace setup;
          #   - CHOWN:     hand the per-VM chroot files to the jailed uid/gid;
          #   - SETUID / SETGID: drop the jailed Firecracker to the per-VM uid;
          #   - MKNOD:     create /dev/kvm and /dev/net/tun nodes in each chroot;
          #   - NET_ADMIN: create the per-template placeholder tap at BUILD time
          #     (`ip tuntap add`, --enable-networking); scoped to forkd's own pod
          #     netns (forkd is not hostNetwork), like the husk pod's NET_ADMIN.
          #   - DAC_OVERRIDE: reopen the template rootfs.ext4 the builder itself
          #     wrote, after the jailer chowned the shared inode to the per-VM
          #     uid, so a rebuild does not fail with EACCES (#426).
          # /dev/kvm and /dev/net/tun come from the device plugin (mitos.run/kvm),
          # NOT a privileged hostPath, so the device cgroup is scoped by the
          # kubelet. allowPrivilegeEscalation: false and seccompProfile
          # RuntimeDefault complete the hardening (privileged: true had disabled
          # seccomp). docs/threat-model.md records the reduced blast radius.
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
                - CHOWN
                - SETUID
                - SETGID
                - MKNOD
                - NET_ADMIN
                - DAC_OVERRIDE
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
              # The device plugin injects /dev/kvm and /dev/net/tun on Allocate;
              # requesting the extended resource is what replaces privileged: true
              # for device access.
              mitos.run/kvm: "1"
            limits:
              memory: "16Gi"
              cpu: "8"
              mitos.run/kvm: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mitos
            - name: tls
              mountPath: /etc/forkd/tls
              readOnly: true
            - name: ca
              mountPath: /etc/forkd/ca
              readOnly: true
            - name: docker-config
              mountPath: /etc/forkd/docker
              readOnly: true
          # Readiness is fail-closed on the required host device (/dev/kvm): if
          # the device plugin or a node kernel module drops it, /readyz returns
          # 503, this pod goes NotReady, and the controller stops routing forks
          # here instead of every fork hanging (issue #571).
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          # Liveness stays on /healthz (process up), so a missing device parks the
          # pod NotReady rather than crash-looping it; readiness recovers with no
          # restart once the device returns.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: data
          hostPath:
            path: /var/lib/mitos
            type: DirectoryOrCreate
        # /dev/kvm and /dev/net/tun are injected by the device plugin
        # (mitos.run/kvm) on Allocate, NOT a privileged hostPath CharDevice.
        # Created by the controller's PKI bootstrap (EnsurePKI) at startup.
        - name: tls
          secret:
            secretName: mitos-forkd-tls
        # Only the CA certificate is projected; the CA private key in this
        # secret must never reach forkd.
        - name: ca
          secret:
            secretName: mitos-ca
            items:
              - key: ca.crt
                path: ca.crt
        # forkd's registry credentials for OCI template pulls. Reuses the
        # ghcr-pull dockerconfigjson secret, projected to the config.json name
        # the docker/containerd auth resolver reads under DOCKER_CONFIG.
        - name: docker-config
          secret:
            secretName: ghcr-pull
            items:
              - key: .dockerconfigjson
                path: config.json
