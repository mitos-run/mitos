apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: mitos.v0.4.0
  namespace: placeholder
  annotations:
    capabilities: Basic Install
    categories: Application Runtime,Developer Tools
    containerImage: ghcr.io/mitos-run/mitos-controller:v0.4.0
    repository: https://github.com/mitos-run/mitos
    support: mitos
    createdAt: "2026-06-22T00:00:00Z"
    description: >-
      Snapshot-fork microVM sandboxes for AI agents on Kubernetes. mitos boots
      Firecracker microVMs, forks them via copy-on-write snapshots, and exposes
      the whole lifecycle through declarative CRDs.
    alm-examples: |-
      [
        {
          "apiVersion": "mitos.run/v1alpha1",
          "kind": "SandboxTemplate",
          "metadata": {
            "name": "full-workspace-agent"
          },
          "spec": {
            "image": "python:3.12-slim",
            "init": [
              "pip install numpy pandas scikit-learn"
            ],
            "resources": {
              "cpu": "2",
              "memory": "2Gi"
            },
            "volumes": [
              {
                "name": "datasets",
                "mountPath": "/data",
                "readOnly": true,
                "forkPolicy": "Share",
                "source": {
                  "s3": {
                    "bucket": "ml-datasets",
                    "prefix": "/training",
                    "region": "us-east-1"
                  }
                }
              },
              {
                "name": "code",
                "mountPath": "/workspace",
                "size": "10Gi",
                "storageClass": "btrfs-csi",
                "forkPolicy": "Snapshot",
                "snapshotClass": "btrfs-snapshots",
                "source": {
                  "git": {
                    "repo": "https://github.com/org/agent-workspace",
                    "branch": "main"
                  }
                }
              },
              {
                "name": "state",
                "mountPath": "/state",
                "size": "2Gi",
                "forkPolicy": "Clone"
              },
              {
                "name": "scratch",
                "mountPath": "/tmp",
                "size": "1Gi",
                "forkPolicy": "Fresh"
              }
            ],
            "networkPolicy": {
              "egress": "deny",
              "allow": [
                "api.openai.com:443",
                "*.s3.amazonaws.com:443"
              ]
            }
          }
        },
        {
          "apiVersion": "mitos.run/v1alpha1",
          "kind": "SandboxPool",
          "metadata": {
            "name": "python-agent-pool"
          },
          "spec": {
            "templateRef": {
              "name": "python-agent"
            },
            "replicas": 10,
            "snapshotAfter": "Ready",
            "scaleDownAfterSnapshot": true
          }
        },
        {
          "apiVersion": "mitos.run/v1alpha1",
          "kind": "SandboxClaim",
          "metadata": {
            "name": "agent-session-1"
          },
          "spec": {
            "poolRef": {
              "name": "python-agent-pool"
            },
            "env": [
              {
                "name": "SESSION_ID",
                "value": "abc-123"
              }
            ],
            "secrets": [
              {
                "name": "openai-key",
                "secretRef": {
                  "name": "agent-secrets",
                  "key": "OPENAI_API_KEY"
                },
                "envVar": "OPENAI_API_KEY"
              }
            ],
            "timeout": "30m"
          }
        },
        {
          "apiVersion": "mitos.run/v1alpha1",
          "kind": "SandboxFork",
          "metadata": {
            "name": "parallel-attempt"
          },
          "spec": {
            "sourceRef": {
              "name": "agent-session-1"
            },
            "replicas": 3
          }
        }
      ]
spec:
  displayName: mitos
  description: |-
    ## mitos

    Snapshot-fork microVM sandboxes for AI agents on Kubernetes. mitos boots
    Firecracker microVMs, forks them via copy-on-write snapshots, and exposes
    the whole lifecycle through declarative custom resources in the API group
    `mitos.run`.

    Agent harnesses need fast, isolated environments where agents can read and
    write files, install packages, and run untrusted code. mitos gives each
    agent an isolated, forkable computer: a Firecracker microVM that restores
    from a memory snapshot, forks into parallel attempts via copy-on-write, and
    can persist a durable workspace. You drive the whole lifecycle through
    declarative CRDs on your own cluster.

    ### What this operator installs

    This operator deploys the mitos **controller**, a Deployment that reconciles
    the mitos custom resources and selects nodes for sandbox placement. The
    controller, once running, deploys and drives the per-node components it needs
    (the privileged `forkd` DaemonSet and, on the husk pod-native default, warm
    husk pods). Those node-level components are managed by the controller and are
    not installed directly by OLM.

    ### Custom resources

    - **SandboxTemplate**: the immutable definition of a sandbox; image, init
      steps, resources, volumes with per-volume fork policy, and an egress
      allowlist.
    - **SandboxPool**: a warm pool built from a template; pre-snapshots VMs so a
      claim activates in place.
    - **SandboxClaim**: a request for a Ready sandbox out of a pool, with
      per-claim env and mounted Secrets.
    - **SandboxFork**: an N-way copy-on-write fork of a running sandbox into
      independent siblings.
    - **Sandbox**: a single running sandbox instance.
    - **Workspace** and **WorkspaceRevision**: durable, forkable workspace state
      and its committed revisions.

    ### Requirements (read before installing)

    mitos runs real virtual machines. It requires:

    - Cluster nodes with **KVM / hardware virtualization** available to the
      `forkd` DaemonSet (nested virtualization if running on a virtualized
      platform).
    - The ability to run a **privileged DaemonSet** that accesses `/dev/kvm` and
      host paths on those nodes.
    - Bare metal is the reference platform (Hetzner plus Talos). Managed control
      planes and locked-down platforms may not permit the privilege and device
      access mitos needs; verify before relying on it.

    The controller image referenced by this bundle is
    `ghcr.io/mitos-run/mitos-controller:v0.4.0`. NOTE: the project is migrating
    its image registry; the controller and the node images
    (`mitos-forkd`, `mitos-husk-stub`, `mitos-kvm-device-plugin`, `mitos-facade`)
    must be present under `ghcr.io/mitos-run` before this bundle can install and
    run. Until then the images are published under `ghcr.io/paperclipinc`.

    Project website: https://mitos.run
    Documentation: https://mitos.run/docs
    Source: https://github.com/mitos-run/mitos
  version: 0.4.0
  maturity: alpha
  minKubeVersion: 1.28.0
  keywords:
    - sandbox
    - firecracker
    - microvm
    - ai-agents
    - fork
    - snapshot
    - kvm
    - agents
  provider:
    name: mitos
    url: https://mitos.run
  maintainers:
    - name: mitos maintainers
      email: maintainers@mitos.run
  links:
    - name: Website
      url: https://mitos.run
    - name: Documentation
      url: https://mitos.run/docs
    - name: Source
      url: https://github.com/mitos-run/mitos
  icon:
    - base64data: 
      mediatype: image/svg+xml
  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true
  customresourcedefinitions:
    owned:
      - name: sandboxtemplates.mitos.run
        kind: SandboxTemplate
        version: v1alpha1
        displayName: Sandbox Template
        description: >-
          The immutable definition of a sandbox: image, init steps, resources,
          volumes with per-volume fork policy, and an egress allowlist. A
          read-only input to pool, claim, and fork placement.
      - name: sandboxpools.mitos.run
        kind: SandboxPool
        version: v1alpha1
        displayName: Sandbox Pool
        description: >-
          A warm pool built from a SandboxTemplate. Pre-snapshots VMs and
          maintains warm capacity so a SandboxClaim activates in place rather
          than booting from cold.
      - name: sandboxclaims.mitos.run
        kind: SandboxClaim
        version: v1alpha1
        displayName: Sandbox Claim
        description: >-
          A request for a Ready sandbox out of a pool, with per-claim
          environment variables and mounted Secrets. Carries a timeout and a
          terminate finalizer so a Ready sandbox is reaped cleanly.
      - name: sandboxforks.mitos.run
        kind: SandboxFork
        version: v1alpha1
        displayName: Sandbox Fork
        description: >-
          An N-way live copy-on-write fork of a running sandbox into independent
          sibling sandboxes, for trying several approaches in parallel.
      - name: sandboxes.mitos.run
        kind: Sandbox
        version: v1alpha2
        displayName: Sandbox
        description: >-
          A single running sandbox instance: an isolated Firecracker microVM
          with exec, file, and environment access.
      - name: workspaces.mitos.run
        kind: Workspace
        version: v1alpha1
        displayName: Workspace
        description: >-
          Durable, forkable workspace state. Tracks the head revision and the
          resumable set, and reconciles its owned WorkspaceRevisions under a
          retention policy.
      - name: workspacerevisions.mitos.run
        kind: WorkspaceRevision
        version: v1alpha1
        displayName: Workspace Revision
        description: >-
          A committed revision of a Workspace, owner-referenced by its
          Workspace; carries the diff summary and lineage for a dehydrated
          workspace state.
  install:
    strategy: deployment
    spec:
      clusterPermissions:
        - serviceAccountName: mitos-controller
          rules:
            - apiGroups:
                - mitos.run
              resources:
                - sandboxclaims
                - sandboxes
                - sandboxforks
                - sandboxpools
                - workspacerevisions
                - workspaces
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - mitos.run
              resources:
                - sandboxtemplates
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - mitos.run
              resources:
                - sandboxclaims/finalizers
                - sandboxes/finalizers
                - sandboxforks/finalizers
              verbs:
                - update
            - apiGroups:
                - mitos.run
              resources:
                - sandboxclaims/status
                - sandboxes/status
                - sandboxforks/status
                - sandboxpools/status
                - workspacerevisions/status
                - workspaces/status
              verbs:
                - get
                - patch
                - update
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - ""
              resources:
                - nodes
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - ""
              resources:
                - secrets
              verbs:
                - create
                - delete
                - get
                - list
                - update
                - watch
            - apiGroups:
                - rbac.authorization.k8s.io
              resources:
                - clusterroles
              verbs:
                - bind
              resourceNames:
                - mitos-pool-secrets
            - apiGroups:
                - rbac.authorization.k8s.io
              resources:
                - rolebindings
              verbs:
                - create
                - delete
                - get
                - list
                - update
                - watch
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
            - apiGroups:
                - policy
              resources:
                - poddisruptionbudgets
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - networking.k8s.io
              resources:
                - networkpolicies
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - coordination.k8s.io
              resources:
                - leases
              verbs:
                - create
                - get
                - list
                - update
                - watch
      deployments:
        - name: mitos-controller
          label:
            app.kubernetes.io/name: mitos
            app.kubernetes.io/component: controller
          spec:
            replicas: 2
            selector:
              matchLabels:
                app.kubernetes.io/name: mitos
                app.kubernetes.io/component: controller
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: mitos
                  app.kubernetes.io/component: controller
              spec:
                serviceAccountName: mitos-controller
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                containers:
                  - name: controller
                    image: ghcr.io/mitos-run/mitos-controller:v0.4.0
                    args:
                      - --metrics-bind-address=:8080
                      - --health-probe-bind-address=:8081
                      - --enable-husk-pods
                      - --husk-stub-image=ghcr.io/mitos-run/mitos-husk-stub:v0.4.0
                      - --husk-data-dir=/var/lib/mitos
                    ports:
                      - name: metrics
                        containerPort: 8080
                      - name: health
                        containerPort: 8081
                    resources:
                      requests:
                        memory: "128Mi"
                        cpu: "100m"
                      limits:
                        memory: "512Mi"
                        cpu: "500m"
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                        drop:
                          - ALL
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: health
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: health
                      initialDelaySeconds: 15
                      periodSeconds: 20
