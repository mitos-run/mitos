# Default dev pool in the `default` namespace: `mitos sandbox create` creates
# sandboxes there and the sandbox reconciler looks up the pool in the sandbox's
# namespace. The controller (in mitos) discovers the mock forkd, builds this
# pool's snapshot over insecure gRPC, and sandboxes claiming from it reach
# Ready. No CSI/snapshot volumes, so it reconciles on the no-KVM node.
apiVersion: mitos.run/v1
kind: SandboxPool
metadata:
  name: dev-default
  namespace: default
spec:
  template:
    image: python:3.12-slim
    resources:
      cpu: "1"
      memory: "512Mi"
  snapshots:
    replicasPerNode: 1
    snapshotAfter: Ready
