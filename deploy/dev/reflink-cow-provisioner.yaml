# Reflink CoW provisioner (KVM node): mounts a reversible loopback XFS(reflink=1)
# at /var/lib/mitos-cow so the husk per-fork rootfs clone is a FICLONE (~16ms,
# proven on the forkbench) instead of a full copy (~40ms warm / ~448ms cold).
# Does the mount INSIDE the container with mountPropagation: Bidirectional so it
# propagates to the host (no host shell needed - the node OS is shell-less).
# Idempotent (skips if mounted); reversible (umount + rm the image on the host).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mitos-reflink-cow
  namespace: mitos
  labels: { app.kubernetes.io/component: reflink-cow }
spec:
  selector: { matchLabels: { app.kubernetes.io/component: reflink-cow } }
  template:
    metadata: { labels: { app.kubernetes.io/component: reflink-cow } }
    spec:
      nodeSelector: { mitos.run/kvm: "true" }
      tolerations:
        - { key: mitos.run/dedicated, operator: Exists, effect: NoSchedule }
        - { key: mitos.run/dedicated, operator: Exists, effect: NoExecute }
      containers:
        - name: provisioner
          image: alpine:3.20
          securityContext: { privileged: true }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache xfsprogs util-linux e2fsprogs >/dev/null 2>&1
              IMG=/host-var-lib/mitos-reflink.img
              MNT=/var/lib/mitos-cow
              if mountpoint -q "$MNT"; then
                echo "reflink CoW already mounted at $MNT"
              else
                [ -f "$IMG" ] || truncate -s 50G "$IMG"
                blkid "$IMG" 2>/dev/null | grep -q 'TYPE="xfs"' || mkfs.xfs -m reflink=1 -q "$IMG"
                mkdir -p "$MNT"
                mount -o loop "$IMG" "$MNT"
                echo "mounted reflink CoW (XFS reflink=1) at $MNT"
              fi
              mkdir -p "$MNT/forks" "$MNT/husk-rootfs"
              df -T "$MNT" | tail -1
              echo REFLINK-COW-READY
              sleep infinity
          volumeMounts:
            - { name: host-var-lib, mountPath: /host-var-lib }
            - { name: cow, mountPath: /var/lib/mitos-cow, mountPropagation: Bidirectional }
      volumes:
        - name: host-var-lib
          hostPath: { path: /var/lib }
        - name: cow
          hostPath: { path: /var/lib/mitos-cow, type: DirectoryOrCreate }
