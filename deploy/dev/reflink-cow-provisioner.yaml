# Reflink CoW provisioner (KVM node): mounts a reversible loopback XFS(reflink=1)
# at /var/lib/mitos-cow so the husk per-fork rootfs clone is a FICLONE (~16ms)
# instead of a full copy (~40ms warm / ~448ms cold). Reversible: umount + rm the
# image restores the node. It nsenters the host mount namespace so the mount is
# visible to the husk pods' hostPath mounts. Idempotent: skips if already mounted.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mitos-reflink-cow
  namespace: mitos
  labels: { app.kubernetes.io/component: reflink-cow }
spec:
  selector: { matchLabels: { app.kubernetes.io/component: reflink-cow } }
  template:
    metadata: { labels: { app.kubernetes.io/component: reflink-cow } }
    spec:
      hostPID: true
      nodeSelector: { mitos.run/kvm: "true" }
      tolerations:
        - { key: mitos.run/dedicated, operator: Exists, effect: NoSchedule }
        - { key: mitos.run/dedicated, operator: Exists, effect: NoExecute }
      containers:
        - name: provisioner
          image: alpine:3.20
          securityContext: { privileged: true }
          command:
            - nsenter
            - "-t"
            - "1"
            - "-m"
            - "-u"
            - "-i"
            - "-n"
            - "-p"
            - "--"
            - sh
            - "-c"
            - |
              set -e
              IMG=/var/lib/mitos-reflink.img
              MNT=/var/lib/mitos-cow
              if mountpoint -q "$MNT"; then
                echo "reflink CoW already mounted at $MNT"
              else
                [ -f "$IMG" ] || truncate -s 50G "$IMG"
                blkid "$IMG" 2>/dev/null | grep -q 'TYPE="xfs"' || mkfs.xfs -m reflink=1 -q "$IMG"
                mkdir -p "$MNT"
                mount -o loop "$IMG" "$MNT"
                echo "mounted reflink CoW (XFS reflink=1) at $MNT"
              fi
              mkdir -p "$MNT/forks" "$MNT/husk-rootfs"
              df -T "$MNT" | tail -1
              echo REFLINK-COW-READY
              sleep infinity
