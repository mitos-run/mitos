# Dev forkd: mock fork engine on kind, no KVM, no jailer, no TLS.
# --mock selects internal/fork/mock.go (KVMAvailable=false). No /dev/kvm mount
# and no mitos.run/kvm nodeSelector, so it schedules on the plain kind node.
# No --tls-* flags, so the gRPC listener is insecure; the controller dials it
# insecure because PKI bootstrap is disabled. forkd fails closed without mTLS by
# default, so this dev-only manifest passes --allow-insecure-grpc to opt in to
# the unauthenticated listener; the production base (deploy/) always sets TLS and
# never needs it. The controller discovers this pod by the
# app.kubernetes.io/component: forkd label.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mitos-forkd
  namespace: mitos
  labels:
    app.kubernetes.io/name: mitos
    app.kubernetes.io/component: forkd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mitos
      app.kubernetes.io/component: forkd
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mitos
        app.kubernetes.io/component: forkd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      # forkd owns every VM, warm pool, and snapshot on its node; a kubelet
      # eviction (e.g. node DiskPressure) drops the whole node's fork capability.
      # system-node-critical is a built-in PriorityClass present in every cluster.
      priorityClassName: system-node-critical
      containers:
        - name: forkd
          image: mitos-forkd:ci
          imagePullPolicy: IfNotPresent
          args:
            - --listen=:9090
            - --http=:9091
            - --data-dir=/var/lib/mitos
            - --mock
            - --allow-insecure-grpc
          ports:
            - name: grpc
              containerPort: 9090
            - name: metrics
              containerPort: 9091
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mitos
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
