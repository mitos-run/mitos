name: Publish signed images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build and publish (for example v0.1.0)"
        required: true
      ref:
        description: "Git ref to build from. Defaults to the tag. Set to main to build current code when a tag predates a component Dockerfile."
        required: false

permissions:
  contents: read

jobs:
  publish:
    # Build, push, cosign keyless-sign, and SBOM-attest the seven Mitos images
    # under ghcr.io/mitos-run (supply chain, issue #35). Keyless signing
    # uses the workflow GitHub OIDC identity (id-token: write); there is NO
    # private key in the repo or in secrets. Each image is pushed by digest and
    # the signature and SBOM attestation are bound to that digest.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mitos-controller
            dockerfile: Dockerfile.controller
          - name: mitos-forkd
            dockerfile: Dockerfile.forkd
          - name: mitos-husk-stub
            dockerfile: Dockerfile.husk-stub
          - name: mitos-kvm-device-plugin
            dockerfile: Dockerfile.kvm-device-plugin
          - name: mitos-facade
            dockerfile: Dockerfile.facade
          - name: preview-proxy
            dockerfile: Dockerfile.preview-proxy
          - name: mitos-console
            dockerfile: Dockerfile.console
          - name: mitos-gateway
            dockerfile: Dockerfile.gateway
          - name: mitos-frontdoor
            dockerfile: Dockerfile.frontdoor
          - name: mitos-computer-use
            dockerfile: images/computer-use/Dockerfile
    env:
      REGISTRY: ghcr.io
      IMAGE: ghcr.io/mitos-run/${{ matrix.name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # On a tag push this is the tag ref; on manual workflow_dispatch check
          # out the requested tag so the build matches it. release-please pushes
          # the release tag with GITHUB_TOKEN, which does NOT auto-trigger
          # on: push: tags, so a release is published by dispatching this workflow
          # with the tag input.
          ref: ${{ github.event.inputs.ref || github.event.inputs.tag || github.ref }}
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          # Prefer a maintainer PAT with write:packages (repo secret
          # GHCR_WRITE_TOKEN) when present; the default GITHUB_TOKEN is denied
          # write_package on the org ghcr packages, so the release image push
          # fails without it. Falls back to GITHUB_TOKEN once the packages grant
          # this repo Write. Same pattern as .github/workflows/cluster-e2e.yaml.
          username: ${{ secrets.GHCR_WRITE_USER || github.actor }}
          password: ${{ secrets.GHCR_WRITE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
            type=sha
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Cosign keyless sign by digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
      - name: Cosign attest the SBOM by digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate "sbom-${{ matrix.name }}.spdx.json" \
            --type spdxjson \
            "${IMAGE}@${DIGEST}"
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json

  verify-public-images:
    # Release guard: after publishing, assert that every image the chart points
    # at (the artifacthub.io/images annotation, which is exactly what Artifact
    # Hub scans and what `helm install` pulls) actually exists in GHCR AND is
    # anonymously pullable, i.e. public. A brand new component package defaults
    # to private, and a failed build leaves no image at all; either way this job
    # turns that into a loud red release here instead of a silent Artifact Hub
    # scan-failure email weeks later. Anonymous-pullable is the precise contract:
    # if the GHCR token endpoint denies an anonymous pull scope, the package is
    # private or missing, and this fails.
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Every chart-referenced image is public and pullable
        run: |
          set -euo pipefail
          imgs=$(grep -oE 'ghcr\.io/mitos-run/[a-z0-9-]+:[A-Za-z0-9._-]+' \
            deploy/charts/mitos/Chart.yaml | sort -u)
          echo "Chart-referenced images:"; echo "${imgs}"
          fail=0
          for ref in ${imgs}; do
            repo="${ref%:*}"; tag="${ref##*:}"; path="${repo#ghcr.io/}"
            # An anonymous bearer token is only granted for public packages; a 403
            # here means private or nonexistent (GHCR returns DENIED for both).
            token=$(curl -fsSL \
              "https://ghcr.io/token?scope=repository:${path}:pull&service=ghcr.io" \
              | sed -E 's/.*"token":"([^"]+)".*/\1/') || token=""
            if [ -z "${token}" ]; then
              echo "::error::${ref} is not anonymously pullable (private or missing package)"
              fail=1; continue
            fi
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${token}" \
              -H 'Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json' \
              "https://ghcr.io/v2/${path}/manifests/${tag}")
            if [ "${code}" != "200" ]; then
              echo "::error::${ref} manifest is not publicly resolvable (HTTP ${code})"
              fail=1
            else
              echo "ok: ${ref}"
            fi
          done
          if [ "${fail}" != "0" ]; then
            echo "::error::One or more chart-referenced images are missing or private in GHCR"
            exit 1
          fi
