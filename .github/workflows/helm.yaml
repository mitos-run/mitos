name: Helm chart

# Lint and render the Mitos Helm chart so it cannot drift from deploy/ or ship
# broken. Runs on changes to the chart or the manifests it mirrors.
on:
  push:
    branches: [main]
    paths:
      - "deploy/charts/**"
      - ".github/workflows/helm.yaml"
  pull_request:
    paths:
      - "deploy/charts/**"
      - ".github/workflows/helm.yaml"

permissions:
  contents: read

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.3
      - name: Lint
        run: helm lint deploy/charts/mitos
      - name: Render with defaults
        run: helm template mitos deploy/charts/mitos --namespace mitos --kube-version 1.31.0 > /dev/null
      - name: Render with all features enabled
        run: |
          helm template mitos deploy/charts/mitos --namespace mitos --kube-version 1.31.0 \
            --set monitoring.enabled=true \
            --set facade.enabled=true \
            --set imagePullSecret.create=true \
            --set imagePullSecret.dockerconfigjson=e30= > /dev/null
      - name: Render with the hardened-runtime (Talos) profile
        run: |
          # The values/talos.yaml profile must render, and its forkd delta
          # (Unconfined seccomp + CAP_FOWNER) must reach the DaemonSet (#525).
          out=$(helm template mitos deploy/charts/mitos --namespace mitos --kube-version 1.31.0 \
            -f deploy/charts/mitos/values/talos.yaml)
          echo "$out" | grep -q 'FOWNER' || { echo "talos profile did not add CAP_FOWNER"; exit 1; }
          echo "$out" | grep -q 'type: Unconfined' || { echo "talos profile did not set Unconfined seccomp"; exit 1; }
      - name: Install promtool
        # Same tarball and version as the manifests job in ci.yaml. It
        # validates the PromQL in the chart's PrometheusRule (including the
        # SaaS group, which exists ONLY in the chart, unlike the engine rules
        # mirrored in deploy/monitoring/), so a bad expression fails CI.
        run: |
          set -euo pipefail
          curl -sSLo /tmp/prometheus.tar.gz \
            https://github.com/prometheus/prometheus/releases/download/v2.53.1/prometheus-2.53.1.linux-amd64.tar.gz
          tar -xzf /tmp/prometheus.tar.gz -C /tmp
          sudo install /tmp/prometheus-2.53.1.linux-amd64/promtool /usr/local/bin/promtool
          promtool --version
      - name: promtool validates the chart PrometheusRule
        # Render every rule group the chart can emit (monitoring + canary +
        # usage collector on; gateway and console default on), extract
        # .spec.groups to the bare {groups: [...]} document promtool expects,
        # and check it. Also assert the monitoring toggle really gates the
        # rule: with monitoring off the template must render nothing.
        run: |
          set -euo pipefail
          helm template mitos deploy/charts/mitos --namespace mitos --kube-version 1.31.0 \
            --set monitoring.enabled=true \
            --set canary.enabled=true \
            --set controller.usage.collector=true \
            --show-only templates/monitoring-prometheusrule.yaml > /tmp/mitos-chart-rule.yaml
          python3 -c 'import yaml; d=yaml.safe_load(open("/tmp/mitos-chart-rule.yaml")); yaml.safe_dump({"groups": d["spec"]["groups"]}, open("/tmp/mitos-chart-rules.yaml","w"))'
          promtool check rules /tmp/mitos-chart-rules.yaml
          if helm template mitos deploy/charts/mitos --namespace mitos --kube-version 1.31.0 \
            --show-only templates/monitoring-prometheusrule.yaml > /dev/null 2>&1; then
            echo "monitoring.enabled=false still rendered the PrometheusRule"; exit 1
          fi
