name: Cluster e2e (self-hosted)

# =============================================================================
# SECURITY: this workflow runs on a SELF-HOSTED runner that lives INSIDE the
# maintainer's multi-node Talos KVM cluster. That runner can drive the cluster
# (it has KVM via the husk pods and a scoped ServiceAccount). The repo
# mitos-run/mitos is PUBLIC. Therefore this job MUST NEVER execute code from
# an untrusted fork pull request: a malicious fork PR could otherwise own the
# cluster.
#
# Gating (non-negotiable):
#   * push to main            post-merge verification of already-reviewed code.
#   * workflow_dispatch       manual maintainer trigger.
#   * pull_request            OPT-IN ONLY, and gated by the job-level `if:` to:
#                               (a) same-repo PRs (head.repo == base repo, i.e.
#                                   NOT a fork), AND
#                               (b) a maintainer-applied label `ci-cluster`.
#                             Combined with the `cluster` GitHub Environment
#                             (which should require a maintainer approval), this
#                             means fork-PR code can never reach the runner.
#
# A fork PR (head.repo.full_name != github.repository) fails BOTH the same-repo
# check and the label check, so the job is skipped. Do NOT relax the `if:`.
# =============================================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      e2e_namespace:
        description: "Namespace to run the e2e in"
        required: false
        default: mitos-e2e
      suite:
        description: "Which cluster e2e suite to run: husk, husk-network, workspace, facade, or all"
        required: false
        default: all
        type: choice
        options:
          - all
          - husk
          - husk-network
          - workspace
          - facade
  # OPT-IN labeled-same-repo-PR path. The `pull_request` event fires for forks
  # too, but the job-level `if:` below excludes forks AND requires the label, so
  # a labeled fork PR still cannot run here.
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened]

# Least-privilege token at the workflow level: read the repo. The build-images
# job widens this to packages: write for itself only.
permissions:
  contents: read

concurrency:
  # Group PER REF, and only cancel in-progress runs for PRs. The single
  # self-hosted runner already serializes execution (one job at a time), so this
  # group governs CANCELLATION policy, not concurrency:
  #   * A PR run lives in its own per-ref group, so it can NEVER cancel a main
  #     (push) post-merge validation, and two PRs never cancel each other.
  #   * A new push to a PR cancels that PR's own superseded run (cancel-in-progress
  #     is true only for pull_request), so the node is not wasted on stale commits.
  #   * push to main and workflow_dispatch never cancel an in-flight run
  #     (cancel-in-progress false), so every merged commit gets its own validation;
  #     concurrent main runs simply queue on the single runner.
  # The previous shared static group with cancel-in-progress:true let a skipped PR
  # run cancel an in-flight main run, leaving merged code unvalidated on the cluster.
  group: cluster-e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # -------------------------------------------------------------------------
  # Build the per-commit images the cluster job deploys under test.
  #
  # WHY THIS JOB EXISTS: publish.yaml only builds and pushes images on release
  # git-tags (push: tags: v*), tagging type=ref,event=tag and type=sha. It does
  # NOT run on every push to main or on workflow_dispatch, so no
  # `mitos-controller:sha-<commit>` / `mitos-husk-stub:sha-<commit>` image
  # exists for an arbitrary main commit. Pointing the cluster controller at a
  # nonexistent sha tag yields ImagePullBackOff and the e2e never runs. This job
  # builds the controller and husk-stub for THIS commit and pushes them to GHCR
  # under an `e2e-<sha>` tag the cluster job then deploys.
  #
  # SECURITY: this job runs on a GitHub-hosted ubuntu runner and NEVER touches
  # the cluster. It is still gated by the SAME `if:` as the cluster job so a fork
  # PR cannot trigger even the build (defense in depth; a fork could not push to
  # GHCR anyway, but we do not run untrusted code at all).
  build-images:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'ci-cluster')
      )
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mitos-controller
            dockerfile: Dockerfile.controller
          - name: mitos-husk-stub
            dockerfile: Dockerfile.husk-stub
          - name: mitos-forkd
            dockerfile: Dockerfile.forkd
          - name: mitos-facade
            dockerfile: Dockerfile.facade
    env:
      IMAGE: ghcr.io/mitos-run/${{ matrix.name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          # Prefer a maintainer PAT with write:packages (repo secret
          # GHCR_WRITE_TOKEN) when present; this is the deterministic path if the
          # org restricts the default GITHUB_TOKEN from writing org packages or
          # the package Actions-access grant is not Write. Falls back to
          # GITHUB_TOKEN (which works once the package grants this repo Write).
          username: ${{ secrets.GHCR_WRITE_USER || github.actor }}
          password: ${{ secrets.GHCR_WRITE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Build and push the e2e image for this commit
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.IMAGE }}:e2e-${{ github.sha }}

  cluster-husk-e2e:
    # Build the per-commit images first; this job deploys them under test.
    needs: build-images
    # The self-hosted runner in the cluster. Labels match the runner Deployment
    # (deploy/ci-runner/deployment.yaml LABELS).
    runs-on: [self-hosted, mitos-cluster]

    # SECURITY GATE. Run only on trusted triggers:
    #   * push / workflow_dispatch are inherently maintainer-trusted, OR
    #   * a pull_request that is BOTH from the same repo (NOT a fork) AND carries
    #     the maintainer-applied `ci-cluster` label.
    # The suite filter (workflow_dispatch only) lets a maintainer run just the
    # husk or just the workspace suite; it NEVER widens the trusted-trigger gate.
    if: >-
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'ci-cluster')
        )
      ) &&
      (
        github.event_name != 'workflow_dispatch' ||
        inputs.suite == 'all' || inputs.suite == 'husk'
      )

    # The `cluster` Environment should be configured in repo Settings to require
    # a maintainer approval (a second human gate) and to scope any cluster
    # secrets. See docs/ci-runner.md.
    environment: cluster

    # Tight overall budget: a hung husk activation must not pin the cluster.
    timeout-minutes: 25

    env:
      # The dedicated e2e namespace (the runner's RBAC blast radius). Override
      # via the workflow_dispatch input.
      E2E_NAMESPACE: ${{ github.event.inputs.e2e_namespace || 'mitos-e2e' }}
      # The control-plane namespace where the controller runs.
      MITOS_NAMESPACE: mitos
      # The image tag to deploy under test. The build-images job above built and
      # pushed the controller and husk-stub for THIS commit under the per-commit
      # `e2e-<github.sha>` tag; we deploy that exact tag. This tag is gated and
      # ephemeral (test-only); a per-commit tag is sufficient, no digest pin.
      IMAGE_REGISTRY: ghcr.io/mitos-run
      IMAGE_TAG: e2e-${{ github.sha }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Show context (no secrets)
        run: |
          set -euo pipefail
          echo "event: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "e2e namespace: ${E2E_NAMESPACE}"
          kubectl version --client
          kubectl get nodes -l 'mitos.run/kvm=true' -o wide

      - name: Deploy images under test
        id: deploy
        run: |
          set -euo pipefail
          CONTROLLER_IMG="${IMAGE_REGISTRY}/mitos-controller:${IMAGE_TAG}"
          HUSK_IMG="${IMAGE_REGISTRY}/mitos-husk-stub:${IMAGE_TAG}"
          FORKD_IMG="${IMAGE_REGISTRY}/mitos-forkd:${IMAGE_TAG}"
          echo "Deploying controller=${CONTROLLER_IMG}"
          echo "Deploying husk-stub=${HUSK_IMG}"
          echo "Deploying forkd=${FORKD_IMG}"

          # Update forkd FIRST. forkd is the BUILDER: it builds each template's
          # snapshot and injects the guest agent into it. The e2e creates a fresh
          # template in its first stage, so forkd must already run the code under
          # test before that, otherwise the new template is built with an old
          # guest agent whose vsock protocol does not match the new husk-stub/SDK.
          #
          # Record the current forkd image so teardown can restore it even if a
          # later step fails.
          PREV_FORKD_IMG="$(kubectl -n "${MITOS_NAMESPACE}" get daemonset/mitos-forkd \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "prev_forkd_image=${PREV_FORKD_IMG}" >> "$GITHUB_OUTPUT"
          echo "Previous forkd image: ${PREV_FORKD_IMG}"

          # Point the forkd DaemonSet at the just-built forkd image and wait for
          # its rollout to finish before the e2e proceeds.
          kubectl -n "${MITOS_NAMESPACE}" set image daemonset/mitos-forkd \
            forkd="${FORKD_IMG}"
          kubectl -n "${MITOS_NAMESPACE}" rollout status daemonset/mitos-forkd --timeout=180s

          # Record the current controller image so teardown can restore it even
          # if a later step fails.
          PREV_IMG="$(kubectl -n "${MITOS_NAMESPACE}" get deployment/mitos-controller \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "prev_controller_image=${PREV_IMG}" >> "$GITHUB_OUTPUT"
          echo "Previous controller image: ${PREV_IMG}"

          # Point the controller at the just-built controller image.
          kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-controller \
            controller="${CONTROLLER_IMG}"

          # Point the controller's --husk-stub-image arg at the just-built husk
          # image so newly warmed husk pods run the code under test. Append the
          # arg; argv-last-wins means this overrides the baked default.
          kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
            -p="[{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/args/-\",\"value\":\"--husk-stub-image=${HUSK_IMG}\"}]"

          kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-controller --timeout=300s

      - name: Run the cluster husk e2e
        run: |
          set -euo pipefail
          chmod +x test/cluster-e2e/husk-e2e.sh
          READY_TIMEOUT=240 test/cluster-e2e/husk-e2e.sh "${E2E_NAMESPACE}"

      - name: Run the cluster chaos e2e (failure/GC semantics, issue #163)
        run: |
          set -euo pipefail
          chmod +x test/cluster-e2e/chaos-e2e.sh
          READY_TIMEOUT=240 test/cluster-e2e/chaos-e2e.sh "${E2E_NAMESPACE}"

      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "=== controller deployment ==="
          kubectl -n "${MITOS_NAMESPACE}" describe deployment/mitos-controller
          echo "=== controller logs ==="
          kubectl -n "${MITOS_NAMESPACE}" logs deployment/mitos-controller --tail=200 --all-containers
          echo "=== e2e namespace objects ==="
          kubectl -n "${E2E_NAMESPACE}" get sandboxpools,sandboxes,pods -o wide
          echo "=== e2e husk pod logs ==="
          for p in $(kubectl -n "${E2E_NAMESPACE}" get pods -l 'mitos.run/husk=true' -o name | head -5); do
            echo "--- ${p} ---"
            kubectl -n "${E2E_NAMESPACE}" logs "${p}" --tail=80
          done
          exit 0

      - name: Teardown (always)
        if: always()
        run: |
          set +e
          echo "=== teardown: remove e2e objects ==="
          # The e2e script cleans its own objects on exit; this is the belt-and-
          # suspenders sweep in case the runner step was cancelled mid-run.
          kubectl -n "${E2E_NAMESPACE}" delete sandboxes --all --wait=false
          kubectl -n "${E2E_NAMESPACE}" delete sandboxpools --all --wait=false

          echo "=== teardown: restore the controller image ==="
          PREV="${{ steps.deploy.outputs.prev_controller_image }}"
          if [ -n "${PREV}" ]; then
            kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-controller \
              controller="${PREV}"
            # Drop the --husk-stub-image arg we appended (remove the LAST arg).
            LAST_IDX="$(kubectl -n "${MITOS_NAMESPACE}" get deployment/mitos-controller \
              -o jsonpath='{.spec.template.spec.containers[0].args}' \
              | python3 -c 'import sys,json; a=json.load(sys.stdin); print(len(a)-1)' 2>/dev/null)"
            if [ -n "${LAST_IDX}" ]; then
              kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
                -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/args/${LAST_IDX}\"}]" \
                || true
            fi
            kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-controller --timeout=180s
          else
            echo "no previous controller image recorded; leaving controller as-is"
          fi

          echo "=== teardown: restore the forkd DaemonSet image ==="
          PREV_FORKD="${{ steps.deploy.outputs.prev_forkd_image }}"
          if [ -n "${PREV_FORKD}" ]; then
            kubectl -n "${MITOS_NAMESPACE}" set image daemonset/mitos-forkd \
              forkd="${PREV_FORKD}"
            kubectl -n "${MITOS_NAMESPACE}" rollout status daemonset/mitos-forkd --timeout=180s
          else
            echo "no previous forkd image recorded; leaving forkd as-is"
          fi
          echo "teardown done"
          exit 0

  # ---------------------------------------------------------------------------
  # The real-cluster PREDICATE-LEVEL agents.x-k8s.io facade conformance (issue
  # #357). The object-level facade-conformance kind job proves the facade bridges
  # the upstream Sandbox object-level, but cannot prove the upstream Ready
  # predicate ("Pod is Ready; Service Exists") because no Firecracker VMM boots on
  # a plain kind runner. This job closes that gap on the real KVM cluster: it
  # deploys the facade under test, applies the UPSTREAM Sandbox UNCHANGED, and
  # asserts the upstream Sandbox reaches the in-VM Ready predicate on a real booted
  # microVM, plus exec-through liveness and the operatingMode resume tail. Gated
  # IDENTICALLY to cluster-husk-e2e.
  # ---------------------------------------------------------------------------
  cluster-facade-conformance-e2e:
    needs: build-images
    runs-on: [self-hosted, mitos-cluster]
    if: >-
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'ci-cluster')
        )
      ) &&
      (
        github.event_name != 'workflow_dispatch' ||
        inputs.suite == 'all' || inputs.suite == 'facade'
      )
    environment: cluster
    timeout-minutes: 25
    env:
      E2E_NAMESPACE: ${{ github.event.inputs.e2e_namespace || 'mitos-e2e' }}
      MITOS_NAMESPACE: mitos
      IMAGE_REGISTRY: ghcr.io/mitos-run
      IMAGE_TAG: e2e-${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Show context (no secrets)
        run: |
          set -euo pipefail
          echo "event: ${{ github.event_name }}"
          echo "sha: ${{ github.sha }}"
          echo "e2e namespace: ${E2E_NAMESPACE}"
          kubectl version --client
          kubectl get nodes -l 'mitos.run/kvm=true' -o wide

      - name: Deploy images under test (controller, forkd, husk-stub)
        id: deploy
        run: |
          set -euo pipefail
          CONTROLLER_IMG="${IMAGE_REGISTRY}/mitos-controller:${IMAGE_TAG}"
          HUSK_IMG="${IMAGE_REGISTRY}/mitos-husk-stub:${IMAGE_TAG}"
          FORKD_IMG="${IMAGE_REGISTRY}/mitos-forkd:${IMAGE_TAG}"

          # forkd is the BUILDER; update it first so the e2e template is built with
          # the guest agent under test (same ordering as cluster-husk-e2e).
          PREV_FORKD_IMG="$(kubectl -n "${MITOS_NAMESPACE}" get daemonset/mitos-forkd \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "prev_forkd_image=${PREV_FORKD_IMG}" >> "$GITHUB_OUTPUT"
          kubectl -n "${MITOS_NAMESPACE}" set image daemonset/mitos-forkd forkd="${FORKD_IMG}"
          kubectl -n "${MITOS_NAMESPACE}" rollout status daemonset/mitos-forkd --timeout=180s

          PREV_IMG="$(kubectl -n "${MITOS_NAMESPACE}" get deployment/mitos-controller \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "prev_controller_image=${PREV_IMG}" >> "$GITHUB_OUTPUT"
          kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-controller \
            controller="${CONTROLLER_IMG}"
          kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
            -p="[{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/args/-\",\"value\":\"--husk-stub-image=${HUSK_IMG}\"}]"
          kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-controller --timeout=300s

      - name: Install the upstream agents.x-k8s.io CRDs (vendored, unchanged) and deploy the facade
        run: |
          set -euo pipefail
          FACADE_IMG="${IMAGE_REGISTRY}/mitos-facade:${IMAGE_TAG}"

          # Install the vendored upstream CRDs unchanged.
          kubectl apply -f third_party/agent-sandbox/crds/agents.x-k8s.io_sandboxes.yaml
          kubectl apply -f third_party/agent-sandbox/crds/extensions.agents.x-k8s.io_sandboxtemplates.yaml
          kubectl apply -f third_party/agent-sandbox/crds/extensions.agents.x-k8s.io_sandboxwarmpools.yaml
          kubectl apply -f third_party/agent-sandbox/crds/extensions.agents.x-k8s.io_sandboxclaims.yaml
          kubectl wait --for=condition=Established --timeout=60s crd/sandboxes.agents.x-k8s.io
          for c in sandboxtemplates sandboxwarmpools sandboxclaims; do
            kubectl wait --for=condition=Established --timeout=60s "crd/${c}.extensions.agents.x-k8s.io"
          done
          # v1beta1 is the storage version with a conversion.strategy: Webhook
          # targeting upstream's controller, which we do not run. We exercise only
          # the v1beta1 stable version, so pin conversion to None (clearing the
          # webhook block) on the LIVE CRDs. The vendored files on disk are
          # unchanged (apply-unchanged preserved). See docs/facade-conformance.md.
          for crd in sandboxes.agents.x-k8s.io \
                     sandboxtemplates.extensions.agents.x-k8s.io \
                     sandboxwarmpools.extensions.agents.x-k8s.io \
                     sandboxclaims.extensions.agents.x-k8s.io; do
            kubectl patch crd "$crd" --type=merge \
              -p '{"spec":{"conversion":{"strategy":"None","webhook":null}}}'
          done

          # Deploy the facade under test with --default-pool=default (the script
          # creates a warm pool of that name in the e2e namespace).
          kubectl apply -f deploy/facade/facade.yaml
          kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-facade facade="${FACADE_IMG}"
          kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-facade --timeout=180s

      - name: Run the predicate-level facade conformance e2e
        run: |
          set -euo pipefail
          chmod +x test/cluster-e2e/facade-conformance-kvm.sh
          READY_TIMEOUT=300 FACADE_DEFAULT_POOL=default \
            test/cluster-e2e/facade-conformance-kvm.sh "${E2E_NAMESPACE}"

      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "=== facade deployment ==="
          kubectl -n "${MITOS_NAMESPACE}" describe deployment/mitos-facade
          echo "=== facade logs ==="
          kubectl -n "${MITOS_NAMESPACE}" logs deployment/mitos-facade --tail=200
          echo "=== upstream + bridged objects ==="
          kubectl -n "${E2E_NAMESPACE}" get sandbox.agents.x-k8s.io,sandboxpools.mitos.run,sandbox.mitos.run,pods -o wide
          exit 0

      - name: Teardown (always)
        if: always()
        run: |
          set +e
          echo "=== teardown: remove e2e objects ==="
          kubectl -n "${E2E_NAMESPACE}" delete sandbox.agents.x-k8s.io --all --wait=false
          kubectl -n "${E2E_NAMESPACE}" delete sandboxes.mitos.run --all --wait=false
          kubectl -n "${E2E_NAMESPACE}" delete sandboxpools.mitos.run --all --wait=false
          echo "=== teardown: remove the facade deployment ==="
          kubectl delete -f deploy/facade/facade.yaml --ignore-not-found --wait=false

          echo "=== teardown: restore the controller image ==="
          PREV="${{ steps.deploy.outputs.prev_controller_image }}"
          if [ -n "${PREV}" ]; then
            kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-controller controller="${PREV}"
            LAST_IDX="$(kubectl -n "${MITOS_NAMESPACE}" get deployment/mitos-controller \
              -o jsonpath='{.spec.template.spec.containers[0].args}' \
              | python3 -c 'import sys,json; a=json.load(sys.stdin); print(len(a)-1)' 2>/dev/null)"
            if [ -n "${LAST_IDX}" ]; then
              kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
                -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/args/${LAST_IDX}\"}]" || true
            fi
            kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-controller --timeout=180s
          fi

          echo "=== teardown: restore the forkd DaemonSet image ==="
          PREV_FORKD="${{ steps.deploy.outputs.prev_forkd_image }}"
          if [ -n "${PREV_FORKD}" ]; then
            kubectl -n "${MITOS_NAMESPACE}" set image daemonset/mitos-forkd forkd="${PREV_FORKD}"
            kubectl -n "${MITOS_NAMESPACE}" rollout status daemonset/mitos-forkd --timeout=180s
          fi
          echo "teardown done"
          exit 0

  # ---------------------------------------------------------------------------
  # The real-cluster WORKSPACE e2e (EPIC W4, issue #21). Gated IDENTICALLY to
  # cluster-husk-e2e: same self-hosted-in-cluster runner, same KVM node, the
  # SAME trusted-trigger `if:` (push / workflow_dispatch / labeled-same-repo-PR;
  # forks excluded), and the same `cluster` Environment second human gate. The
  # suite filter only restricts which suite a maintainer dispatch runs; it never
  # widens the fork-PR gate. The two jobs share the single self-hosted runner,
  # which processes one job at a time, so they never drive the cluster at once.
  # ---------------------------------------------------------------------------
  cluster-workspace-e2e:
    needs: build-images
    runs-on: [self-hosted, mitos-cluster]

    if: >-
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'ci-cluster')
        )
      ) &&
      (
        github.event_name != 'workflow_dispatch' ||
        inputs.suite == 'all' || inputs.suite == 'workspace'
      )

    environment: cluster
    timeout-minutes: 25

    env:
      E2E_NAMESPACE: ${{ github.event.inputs.e2e_namespace || 'mitos-e2e' }}
      MITOS_NAMESPACE: mitos
      IMAGE_REGISTRY: ghcr.io/mitos-run
      IMAGE_TAG: e2e-${{ github.sha }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Show context (no secrets)
        run: |
          set -euo pipefail
          echo "event: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "e2e namespace: ${E2E_NAMESPACE}"
          kubectl version --client
          kubectl get nodes -l 'mitos.run/kvm=true' -o wide

      - name: Deploy images under test
        id: deploy
        run: |
          set -euo pipefail
          CONTROLLER_IMG="${IMAGE_REGISTRY}/mitos-controller:${IMAGE_TAG}"
          HUSK_IMG="${IMAGE_REGISTRY}/mitos-husk-stub:${IMAGE_TAG}"
          FORKD_IMG="${IMAGE_REGISTRY}/mitos-forkd:${IMAGE_TAG}"
          echo "Deploying controller=${CONTROLLER_IMG}"
          echo "Deploying husk-stub=${HUSK_IMG}"
          echo "Deploying forkd=${FORKD_IMG}"

          # forkd is the BUILDER (see the husk job): update it first so the fresh
          # template the e2e creates is built with the guest agent under test.
          PREV_FORKD_IMG="$(kubectl -n "${MITOS_NAMESPACE}" get daemonset/mitos-forkd \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "prev_forkd_image=${PREV_FORKD_IMG}" >> "$GITHUB_OUTPUT"
          kubectl -n "${MITOS_NAMESPACE}" set image daemonset/mitos-forkd \
            forkd="${FORKD_IMG}"
          kubectl -n "${MITOS_NAMESPACE}" rollout status daemonset/mitos-forkd --timeout=180s

          PREV_IMG="$(kubectl -n "${MITOS_NAMESPACE}" get deployment/mitos-controller \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "prev_controller_image=${PREV_IMG}" >> "$GITHUB_OUTPUT"
          kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-controller \
            controller="${CONTROLLER_IMG}"
          kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
            -p="[{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/args/-\",\"value\":\"--husk-stub-image=${HUSK_IMG}\"}]"
          kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-controller --timeout=300s

      - name: Run the cluster workspace e2e
        run: |
          set -euo pipefail
          chmod +x test/cluster-e2e/workspace-e2e.sh
          READY_TIMEOUT=240 test/cluster-e2e/workspace-e2e.sh "${E2E_NAMESPACE}"

      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "=== controller deployment ==="
          kubectl -n "${MITOS_NAMESPACE}" describe deployment/mitos-controller
          echo "=== controller logs ==="
          kubectl -n "${MITOS_NAMESPACE}" logs deployment/mitos-controller --tail=200 --all-containers
          echo "=== e2e namespace objects ==="
          kubectl -n "${E2E_NAMESPACE}" get workspaces,workspacerevisions,sandboxpools,sandboxes,pods -o wide
          exit 0

      - name: Teardown (always)
        if: always()
        run: |
          set +e
          echo "=== teardown: remove e2e objects ==="
          kubectl -n "${E2E_NAMESPACE}" delete sandboxes --all --wait=false
          kubectl -n "${E2E_NAMESPACE}" delete workspaces --all --wait=false
          kubectl -n "${E2E_NAMESPACE}" delete sandboxpools --all --wait=false

          echo "=== teardown: restore the controller image ==="
          PREV="${{ steps.deploy.outputs.prev_controller_image }}"
          if [ -n "${PREV}" ]; then
            kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-controller \
              controller="${PREV}"
            LAST_IDX="$(kubectl -n "${MITOS_NAMESPACE}" get deployment/mitos-controller \
              -o jsonpath='{.spec.template.spec.containers[0].args}' \
              | python3 -c 'import sys,json; a=json.load(sys.stdin); print(len(a)-1)' 2>/dev/null)"
            if [ -n "${LAST_IDX}" ]; then
              kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
                -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/args/${LAST_IDX}\"}]" \
                || true
            fi
            kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-controller --timeout=180s
          else
            echo "no previous controller image recorded; leaving controller as-is"
          fi

          echo "=== teardown: restore the forkd DaemonSet image ==="
          PREV_FORKD="${{ steps.deploy.outputs.prev_forkd_image }}"
          if [ -n "${PREV_FORKD}" ]; then
            kubectl -n "${MITOS_NAMESPACE}" set image daemonset/mitos-forkd \
              forkd="${PREV_FORKD}"
            kubectl -n "${MITOS_NAMESPACE}" rollout status daemonset/mitos-forkd --timeout=180s
          else
            echo "no previous forkd image recorded; leaving forkd as-is"
          fi
          echo "teardown done"
          exit 0

  # ---------------------------------------------------------------------------
  # The real-cluster husk NETWORK-ISOLATION e2e (the top untrusted-code blocker,
  # docs/threat-model.md section 1 item 1). Gated IDENTICALLY to
  # cluster-husk-e2e: same self-hosted-in-cluster runner, same KVM node, the SAME
  # trusted-trigger `if:` (push / workflow_dispatch / labeled-same-repo-PR; forks
  # excluded), and the same `cluster` Environment second human gate. The suite
  # filter only restricts which suite a maintainer dispatch runs; it NEVER widens
  # the fork-PR gate. The jobs share the single self-hosted runner, which
  # processes one job at a time, so they never drive the cluster at once.
  # ---------------------------------------------------------------------------
  cluster-husk-network-e2e:
    needs: build-images
    runs-on: [self-hosted, mitos-cluster]

    if: >-
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          contains(github.event.pull_request.labels.*.name, 'ci-cluster')
        )
      ) &&
      (
        github.event_name != 'workflow_dispatch' ||
        inputs.suite == 'all' || inputs.suite == 'husk-network'
      )

    environment: cluster
    timeout-minutes: 25

    env:
      E2E_NAMESPACE: ${{ github.event.inputs.e2e_namespace || 'mitos-e2e' }}
      MITOS_NAMESPACE: mitos
      IMAGE_REGISTRY: ghcr.io/mitos-run
      IMAGE_TAG: e2e-${{ github.sha }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Show context (no secrets)
        run: |
          set -euo pipefail
          echo "event: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "e2e namespace: ${E2E_NAMESPACE}"
          kubectl version --client
          kubectl get nodes -l 'mitos.run/kvm=true' -o wide

      - name: Deploy images under test
        id: deploy
        run: |
          set -euo pipefail
          CONTROLLER_IMG="${IMAGE_REGISTRY}/mitos-controller:${IMAGE_TAG}"
          HUSK_IMG="${IMAGE_REGISTRY}/mitos-husk-stub:${IMAGE_TAG}"
          FORKD_IMG="${IMAGE_REGISTRY}/mitos-forkd:${IMAGE_TAG}"
          echo "Deploying controller=${CONTROLLER_IMG}"
          echo "Deploying husk-stub=${HUSK_IMG}"
          echo "Deploying forkd=${FORKD_IMG}"

          # forkd is the BUILDER (see the husk job): update it first so the fresh
          # template the e2e creates is built with the guest agent under test.
          PREV_FORKD_IMG="$(kubectl -n "${MITOS_NAMESPACE}" get daemonset/mitos-forkd \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "prev_forkd_image=${PREV_FORKD_IMG}" >> "$GITHUB_OUTPUT"
          kubectl -n "${MITOS_NAMESPACE}" set image daemonset/mitos-forkd \
            forkd="${FORKD_IMG}"
          kubectl -n "${MITOS_NAMESPACE}" rollout status daemonset/mitos-forkd --timeout=180s

          PREV_IMG="$(kubectl -n "${MITOS_NAMESPACE}" get deployment/mitos-controller \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "prev_controller_image=${PREV_IMG}" >> "$GITHUB_OUTPUT"
          kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-controller \
            controller="${CONTROLLER_IMG}"
          kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
            -p="[{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/args/-\",\"value\":\"--husk-stub-image=${HUSK_IMG}\"}]"
          # Enable name-based egress for THIS job (the live cluster controller is
          # image-patched, not re-applied, so the manifest's --husk-dns-upstream
          # does not reach it): the per-pod DNS proxy forwards allowlisted queries
          # to a public resolver pair (failover) so the allowlist-works probe
          # (example.com) can resolve and connect. The teardown pops both args.
          kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
            -p="[{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/args/-\",\"value\":\"--husk-dns-upstream=1.1.1.1:53,8.8.8.8:53\"}]"
          kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-controller --timeout=300s

      - name: Run the cluster husk network-isolation e2e
        run: |
          set -euo pipefail
          chmod +x test/cluster-e2e/husk-network-e2e.sh
          READY_TIMEOUT=240 test/cluster-e2e/husk-network-e2e.sh "${E2E_NAMESPACE}"

      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "=== controller deployment ==="
          kubectl -n "${MITOS_NAMESPACE}" describe deployment/mitos-controller
          echo "=== controller logs ==="
          kubectl -n "${MITOS_NAMESPACE}" logs deployment/mitos-controller --tail=200 --all-containers
          echo "=== e2e namespace objects ==="
          kubectl -n "${E2E_NAMESPACE}" get sandboxpools,sandboxes,networkpolicies,pods -o wide
          echo "=== e2e husk pod logs ==="
          for p in $(kubectl -n "${E2E_NAMESPACE}" get pods -l 'mitos.run/husk=true' -o name | head -5); do
            echo "--- ${p} ---"
            kubectl -n "${E2E_NAMESPACE}" logs "${p}" --tail=80
          done
          exit 0

      - name: Teardown (always)
        if: always()
        run: |
          set +e
          echo "=== teardown: remove e2e objects ==="
          kubectl -n "${E2E_NAMESPACE}" delete sandboxes --all --wait=false
          kubectl -n "${E2E_NAMESPACE}" delete sandboxpools --all --wait=false

          echo "=== teardown: restore the controller image ==="
          PREV="${{ steps.deploy.outputs.prev_controller_image }}"
          if [ -n "${PREV}" ]; then
            kubectl -n "${MITOS_NAMESPACE}" set image deployment/mitos-controller \
              controller="${PREV}"
            # Pop the two args this job appended (--husk-stub-image then
            # --husk-dns-upstream): remove the last index twice, recomputing
            # between removes since indices shift.
            for _ in 1 2; do
              LAST_IDX="$(kubectl -n "${MITOS_NAMESPACE}" get deployment/mitos-controller \
                -o jsonpath='{.spec.template.spec.containers[0].args}' \
                | python3 -c 'import sys,json; a=json.load(sys.stdin); print(len(a)-1)' 2>/dev/null)"
              if [ -n "${LAST_IDX}" ] && [ "${LAST_IDX}" -ge 0 ]; then
                kubectl -n "${MITOS_NAMESPACE}" patch deployment/mitos-controller --type=json \
                  -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/args/${LAST_IDX}\"}]" \
                  || true
              fi
            done
            kubectl -n "${MITOS_NAMESPACE}" rollout status deployment/mitos-controller --timeout=180s
          else
            echo "no previous controller image recorded; leaving controller as-is"
          fi

          echo "=== teardown: restore the forkd DaemonSet image ==="
          PREV_FORKD="${{ steps.deploy.outputs.prev_forkd_image }}"
          if [ -n "${PREV_FORKD}" ]; then
            kubectl -n "${MITOS_NAMESPACE}" set image daemonset/mitos-forkd \
              forkd="${PREV_FORKD}"
            kubectl -n "${MITOS_NAMESPACE}" rollout status daemonset/mitos-forkd --timeout=180s
          else
            echo "no previous forkd image recorded; leaving forkd as-is"
          fi
          echo "teardown done"
          exit 0
