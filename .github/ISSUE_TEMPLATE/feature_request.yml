name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What is impossible or painful today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Sketch API shapes or CLI flags if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they fall short.
    validations:
      required: false
  - type: textarea
    id: roadmap-fit
    attributes:
      label: Roadmap fit
      description: Which section of ROADMAP.md does this belong to, or why does it deserve a new one?
    validations:
      required: true
