<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="15">
  <rect x="0.5" y="0.5" width="759" height="429" rx="12" fill="#04050A" stroke="#1B1F2A"/>
  <circle cx="24" cy="24" r="6" fill="#FF45C8"/>
  <circle cx="46" cy="24" r="6" fill="#FFC24B"/>
  <circle cx="68" cy="24" r="6" fill="#4DF0A0"/>
  <text x="380" y="29" text-anchor="middle" font-size="13" fill="#5B6472">mitos — python</text>
  <line x1="0" y1="48" x2="760" y2="48" stroke="#1B1F2A"/>
  <text x="28" y="92"><tspan fill="#FF45C8">$ </tspan><tspan fill="#E6E9EF">pip install mitos</tspan></text>
  <text x="28" y="120"><tspan fill="#FF45C8">$ </tspan><tspan fill="#E6E9EF">python</tspan></text>
  <text x="28" y="148"><tspan fill="#3DDCFF">&gt;&gt;&gt; </tspan><tspan fill="#E6E9EF">import mitos</tspan></text>
  <text x="28" y="176"><tspan fill="#3DDCFF">&gt;&gt;&gt; </tspan><tspan fill="#E6E9EF">sb = mitos.create(</tspan><tspan fill="#4DF0A0">"python"</tspan><tspan fill="#E6E9EF">)</tspan><tspan fill="#5B6472">   # ready microVM · ~27 ms</tspan></text>
  <text x="28" y="204"><tspan fill="#3DDCFF">&gt;&gt;&gt; </tspan><tspan fill="#E6E9EF">sb.exec(</tspan><tspan fill="#4DF0A0">"echo hello"</tspan><tspan fill="#E6E9EF">).stdout</tspan></text>
  <text x="28" y="232" fill="#4DF0A0">'hello\n'</text>
  <text x="28" y="260"><tspan fill="#3DDCFF">&gt;&gt;&gt; </tspan><tspan fill="#E6E9EF">a, b = sb.fork(</tspan><tspan fill="#FFC24B">2</tspan><tspan fill="#E6E9EF">)</tspan><tspan fill="#FF45C8">   # fork into 2 parallel attempts</tspan></text>
  <text x="28" y="288"><tspan fill="#3DDCFF">&gt;&gt;&gt; </tspan><tspan fill="#E6E9EF">a.exec(</tspan><tspan fill="#4DF0A0">"echo conservative &gt; /workspace/plan.txt"</tspan><tspan fill="#E6E9EF">)</tspan></text>
  <text x="28" y="316"><tspan fill="#3DDCFF">&gt;&gt;&gt; </tspan><tspan fill="#E6E9EF">b.exec(</tspan><tspan fill="#4DF0A0">"echo aggressive  &gt; /workspace/plan.txt"</tspan><tspan fill="#E6E9EF">)</tspan></text>
  <text x="28" y="344"><tspan fill="#3DDCFF">&gt;&gt;&gt; </tspan><tspan fill="#E6E9EF">sb.terminate()</tspan></text>
  <text x="28" y="372"><tspan fill="#3DDCFF">&gt;&gt;&gt; </tspan><tspan fill="#FF45C8">&#9608;</tspan></text>
</svg>
