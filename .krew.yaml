apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: mitos
spec:
  version: "{{ .TagName }}"
  homepage: https://github.com/mitos-run/mitos
  shortDescription: Operate mitos.run sandboxes for AI agents
  description: |
    kubectl mitos inspects and operates mitos.run sandbox objects from your
    cluster: it lists sandbox claims and their copy-on-write forks, renders the
    fork lineage, reports per-sandbox memory metering, reads sandbox logs, and
    runs commands inside a sandbox. mitos boots Firecracker microVMs and forks
    them via memory snapshots into parallel attempts. The plugin reads the
    cluster connection from the standard kubeconfig resolution.
  caveats: |
    This plugin talks to the mitos.run CRDs and forkd sandbox API. It requires:
      * a Kubernetes cluster with mitos.run installed (controller + forkd), and
      * a kubeconfig that can read Sandbox objects.
    See https://mitos.run for installation.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      {{ addURIAndSha "https://github.com/mitos-run/mitos/releases/download/{{ .TagName }}/kubectl-mitos_{{ .TagName }}_linux_amd64.tar.gz" .TagName }}
      bin: kubectl-mitos
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      {{ addURIAndSha "https://github.com/mitos-run/mitos/releases/download/{{ .TagName }}/kubectl-mitos_{{ .TagName }}_linux_arm64.tar.gz" .TagName }}
      bin: kubectl-mitos
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      {{ addURIAndSha "https://github.com/mitos-run/mitos/releases/download/{{ .TagName }}/kubectl-mitos_{{ .TagName }}_darwin_amd64.tar.gz" .TagName }}
      bin: kubectl-mitos
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      {{ addURIAndSha "https://github.com/mitos-run/mitos/releases/download/{{ .TagName }}/kubectl-mitos_{{ .TagName }}_darwin_arm64.tar.gz" .TagName }}
      bin: kubectl-mitos
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      {{ addURIAndSha "https://github.com/mitos-run/mitos/releases/download/{{ .TagName }}/kubectl-mitos_{{ .TagName }}_windows_amd64.zip" .TagName }}
      bin: kubectl-mitos.exe
