<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The console is a signed-in app. The SPA shell answers 200 for any
         extension-less path (org slugs, /signup, /keys), so without noindex
         search engines index empty "Mitos console" duplicates of those URLs. -->
    <meta name="robots" content="noindex" />
    <title>Mitos console</title>
    <script>
      // Resolve the theme before first paint so nothing flashes the wrong
      // palette. Mirrors src/appearance.ts DEFAULTS; keep the storage key and
      // accepted values in sync. Dark is the brand default: no stored theme,
      // an unrecognized value, or a storage failure all resolve to 'dark'.
      // Only an explicitly stored 'system' removes data-theme so
      // prefers-color-scheme decides.
      try {
        var mitosTheme = JSON.parse(localStorage.getItem('mitos-appearance') || '{}').theme
        if (mitosTheme === 'system') {
          delete document.documentElement.dataset.theme
        } else if (mitosTheme === 'light') {
          document.documentElement.dataset.theme = 'light'
        } else {
          document.documentElement.dataset.theme = 'dark'
        }
      } catch (e) {
        document.documentElement.dataset.theme = 'dark'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
