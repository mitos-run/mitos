syntax = "proto3";

package forkd;

option go_package = "mitos.run/mitos/proto/forkd;forkdpb";

service ForkDaemon {
  // Template management
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  // PullTemplate fetches a template's snapshot from a peer forkd's CAS over the
  // peer's token-gated, TLS-only /cas surface, materializes it into this node's
  // template dir, verifies it, and records the digest. The controller calls this
  // to distribute a template that was built once on another node.
  rpc PullTemplate(PullTemplateRequest) returns (PullTemplateResponse);

  // Snapshot management
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);

  // Fork operations (hot path; must be <2ms)
  rpc Fork(ForkRequest) returns (ForkResponse);
  rpc ForkRunning(ForkRunningRequest) returns (ForkRunningResponse);

  // Sandbox lifecycle
  rpc Exec(ExecRequest) returns (ExecResponse);
  rpc ExecStream(ExecStreamRequest) returns (stream ExecStreamResponse);
  rpc Terminate(TerminateRequest) returns (TerminateResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);

  // Volume reclamation. ListVolumes enumerates per-sandbox volume backing dirs
  // on this node by scanning disk (not the live sandbox map), so a backing dir
  // whose sandbox is gone is still reported. ReclaimVolume removes one such
  // backing dir. The controller GC uses the pair to sweep volume orphans the
  // same way it sweeps VM orphans.
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse);
  rpc ReclaimVolume(ReclaimVolumeRequest) returns (ReclaimVolumeResponse);

  // File operations
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);

  // Node capacity
  rpc GetCapacity(GetCapacityRequest) returns (GetCapacityResponse);
}

// --- Template management ---

message CreateTemplateRequest {
  string template_id = 1;
  string image = 2;
  repeated string init_commands = 3;
  string kernel_path = 4;
  ResourceSpec resources = 5;
  // Volumes the template declares. The node bakes one placeholder block device
  // per volume into the snapshot at build time so each fork can rebind it to
  // its own backing; the fork's ForkRequest.volumes must match this set by
  // name. Empty means the template has no volumes.
  repeated VolumeMount volumes = 6;
  // encryption_key is the per-template at-rest DEK, WRAPPED by the KMS KEK
  // (envelope encryption). It is opaque ciphertext, not the plaintext key, but
  // is still a SECRET-adjacent value carried only over the mTLS RPC and MUST
  // NEVER be logged or written to the node data disk. The node unwraps it via
  // its KMS at container open/build time and zeroizes the plaintext after.
  // Empty means the template is not encrypted.
  bytes encryption_key = 7;
  // kek_id identifies the KMS KEK that wrapped encryption_key, so the node can
  // select the matching KEK to unwrap. It is NOT secret and may be logged.
  // Empty when the template is not encrypted.
  string kek_id = 8;
  // workload, when set, is a serving process the node starts AFTER init and
  // keeps running while it snapshots, so a fork wakes with the app already
  // listening (issue #460). The node drives it via the guest Control
  // StartWorkload RPC and gates the snapshot on its readiness. Empty means the
  // template has no serving workload (exec-only).
  WorkloadSpec workload = 9;
  // force_rebuild, when true, skips the node's reuse-or-rebuild gate (#584)
  // and always deletes and rebuilds the template, even if a healthy on-disk
  // template already exists. The controller sets it when the template
  // CONTENT changed (issue #475): digest verification proves the on-disk
  // bytes are intact, not that they still match the requested spec. False
  // (the default) lets the node reuse a verified on-disk template.
  bool force_rebuild = 10;
  // warm_kernel, when true, has the node run one trivial run_code cell in the
  // build VM AFTER init and the workload start and BEFORE the snapshot, so the
  // code-interpreter kernel is captured live and every fork skips its ~5s lazy
  // start on the first run_code. The warmup cell draws no randomness (the
  // kernel's Python PRNGs stay unseeded in the snapshot; each fork seeds fresh
  // after the per-fork CRNG reseed, see docs/fork-correctness.md) and fails
  // OPEN: an image without the kernel logs and builds unchanged. False (the
  // default) keeps the lazy kernel start.
  bool warm_kernel = 11;
}

// WorkloadSpec is the serving workload the controller declares for a template
// build (issue #460); the node forwards it to the guest Control StartWorkload.
message WorkloadSpec {
  // command is the serving process argv, run through the shell in the guest.
  repeated string command = 1;
  // env are NON-secret environment variables for the workload. Keys are safe to
  // log; values are not.
  map<string, string> env = 2;
  // ready, when set, is the HTTP gate the build waits on before snapshotting.
  WorkloadHttpReady ready = 3;
}

// WorkloadHttpReady is the HTTP readiness gate for a serving workload. All
// fields are plain values and safe to log.
message WorkloadHttpReady {
  uint32 port = 1;
  string path = 2;
  uint32 expect = 3;
  uint32 timeout_seconds = 4;
}

message CreateTemplateResponse {
  string template_id = 1;
  double creation_time_ms = 2;
  // Content-addressed manifest digest of the snapshot just built. A stable
  // identifier for the snapshot, safe to log; the controller records it in the
  // SandboxPool status.
  string template_digest = 3;
}

message DeleteTemplateRequest {
  string template_id = 1;
}

message DeleteTemplateResponse {}

message PullTemplateRequest {
  // template_id is the id the pulled snapshot is materialized under on this node.
  string template_id = 1;
  // manifest_digest is the content-addressed digest of the source manifest to
  // pull and verify against. The pull fails closed if the materialized snapshot
  // does not re-derive to this digest.
  string manifest_digest = 2;
  // source_url is the base URL of the holder forkd's CAS surface, e.g.
  // "https://10.0.3.7:9091/cas". TLS only.
  string source_url = 3;
  // pull_token is the bearer credential the holder forkd requires on its
  // token-gated CAS surface. It is a SECRET VALUE: it must NEVER be logged,
  // placed in an error message, or recorded as a span attribute, and it travels
  // only over TLS.
  string pull_token = 4;
}

message PullTemplateResponse {
  string template_id = 1;
  // template_digest echoes the verified manifest digest of the pulled snapshot
  // (a content address, safe to log).
  string template_digest = 2;
}

message ListTemplatesRequest {}

message ListTemplatesResponse {
  repeated TemplateInfo templates = 1;
}

message TemplateInfo {
  string template_id = 1;
  string image = 2;
  int64 snapshot_size_bytes = 3;
  int64 created_at_unix = 4;
  bool ready = 5;
}

// --- Snapshot management ---

message CreateSnapshotRequest {
  string template_id = 1;
  string snapshot_id = 2;
  // Wait for this condition before snapshotting
  string wait_condition = 3;
  // Delay after condition is met
  int32 delay_seconds = 4;
}

message CreateSnapshotResponse {
  string snapshot_id = 1;
  double snapshot_time_ms = 2;
  int64 snapshot_size_bytes = 3;
}

message DeleteSnapshotRequest {
  string snapshot_id = 1;
}

message DeleteSnapshotResponse {}

// --- Fork operations ---

message ForkRequest {
  string snapshot_id = 1;
  string sandbox_id = 2;
  repeated EnvVar env = 3;
  repeated SecretVar secrets = 4;
  NetworkConfig network = 5;
  // Bearer token the HTTP sandbox API will require for this sandbox.
  // Empty means no token is registered and HTTP calls fail closed (401).
  string api_token = 6;
  // Volumes to prepare and attach to the fork. The node resolves the backing
  // source for Snapshot/Share/Clone policies; the controller passes the policy
  // and spec.
  repeated VolumeMount volumes = 7;
  // encryption_key is the source template's at-rest DEK, WRAPPED by the KMS KEK
  // (envelope encryption), carried only over the mTLS RPC so the node can open
  // the encrypted container before restoring the snapshot. It is opaque
  // ciphertext, not the plaintext key, but is still a SECRET-adjacent value and
  // MUST NEVER be logged or written to the node data disk. The node unwraps it
  // via its KMS and zeroizes the plaintext after. Empty means the source
  // template is not encrypted.
  bytes encryption_key = 8;
  // kek_id identifies the KMS KEK that wrapped encryption_key, so the node can
  // select the matching KEK to unwrap. It is NOT secret and may be logged.
  // Empty when the source template is not encrypted.
  string kek_id = 9;
  // vitals_labels is the control-plane identity (claim, pool, workspace,
  // namespace) the controller attaches to this fork so the node can LABEL the
  // sandbox's Layer 3 guest telemetry (issue #164): forkd records the labels
  // per-sandbox and returns them in the /v1/vitals response that
  // `kubectl sandbox ps --processes` consumes. The fields are Kubernetes object
  // names, never secrets, and any may be empty when the controller does not know
  // it (e.g. a poolless or workspaceless fork). Absent leaves the sandbox's
  // vitals unlabeled.
  VitalsLabels vitals_labels = 10;
}

// VitalsLabels is the per-sandbox control-plane identity the node attaches to a
// sandbox's guest telemetry so an operator can attribute in-guest processes and
// steal to a specific claim. Every field is a Kubernetes object name, never a
// secret value; any field may be empty.
message VitalsLabels {
  string claim = 1;
  string pool = 2;
  string workspace = 3;
  string namespace = 4;
}

message VolumeMount {
  string name = 1;
  string mount_path = 2;
  bool read_only = 3;
  // fork_policy is the API ForkPolicy string: Fresh, Share, Clone, Snapshot.
  string fork_policy = 4;
  // size is a Kubernetes resource quantity such as 5Gi or 512Mi. Empty uses the
  // node default. Only meaningful for the Fresh policy.
  string size = 5;
}

message ForkResponse {
  string sandbox_id = 1;
  string endpoint = 2;
  double fork_time_ms = 3;
  int64 memory_unique_bytes = 4;
  int64 memory_shared_bytes = 5;
}

message ForkRunningRequest {
  string source_sandbox_id = 1;
  string new_sandbox_id = 2;
  bool pause_source = 3;
  repeated EnvVar env = 4;
  // Bearer token the HTTP sandbox API will require for the new sandbox.
  // Empty means no token is registered and HTTP calls fail closed (401).
  string api_token = 5;
}

message ForkRunningResponse {
  string sandbox_id = 1;
  string endpoint = 2;
  double checkpoint_time_ms = 3;
  double fork_time_ms = 4;
}

// --- Exec ---

message ExecRequest {
  string sandbox_id = 1;
  string command = 2;
  int32 timeout_seconds = 3;
  string working_dir = 4;
  repeated EnvVar env = 5;
}

message ExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  double exec_time_ms = 4;
}

// ExecStream is reserved for a future gRPC streaming transport. Today, like
// Exec, streaming exec is served by the forkd HTTP sandbox API
// (POST /v1/exec/stream, application/x-ndjson) on the HTTP port, not over gRPC.
// The message shapes below are kept aligned with the vsock ExecStreamFrame
// (stream, data, done/exit_code) so a later gRPC binding is a thin adapter.
message ExecStreamRequest {
  string sandbox_id = 1;
  string command = 2;
  int32 timeout_seconds = 3;
  string working_dir = 4;
  repeated EnvVar env = 5;
}

message ExecStreamResponse {
  enum Stream {
    STDOUT = 0;
    STDERR = 1;
  }
  Stream stream = 1;
  bytes data = 2;
  // Set on the final message
  bool done = 3;
  int32 exit_code = 4;
}

// --- Sandbox lifecycle ---

message TerminateRequest {
  string sandbox_id = 1;
}

message TerminateResponse {
  double uptime_seconds = 1;
}

message ListSandboxesRequest {}

message ListSandboxesResponse {
  repeated SandboxInfo sandboxes = 1;
}

message SandboxInfo {
  string sandbox_id = 1;
  int64 created_at_unix = 2;
  // zero when never accessed
  int64 last_activity_unix = 3;
  int64 uptime_seconds = 4;
  // deadline_unix is the live TTL deadline set via set_timeout (issue #218);
  // zero when no live timeout has been set. The controller's lifetime reaper
  // honors it as the running-sandbox TTL.
  int64 deadline_unix = 5;
  // active_streams is the count of OPEN streams (streaming exec, run_code, PTY)
  // for this sandbox: the work-aware idle signal (issue #218). A non-zero count
  // means a background job is running, so the idle reaper must NOT reap the
  // sandbox even when there has been no inbound API interaction.
  int32 active_streams = 6;
  // paused is true when the sandbox has been paused (issue #218): its clock is
  // stopped and it must never be idle-reaped while held.
  bool paused = 7;
}

// --- Volume reclamation ---

message ListVolumesRequest {}

message ListVolumesResponse {
  repeated VolumeInfo volumes = 1;
}

// VolumeInfo describes one per-sandbox volume backing directory on disk. It is
// keyed by the sandbox id (the directory name under sandboxes/<id>/volumes), so
// the controller can match it against the same live-claim and desired-alive
// sets it uses for VM orphans. age_seconds is derived from the directory mtime
// so a freshly-prepared backing whose claim status has not landed yet can be
// protected by the same OrphanGrace the VM sweep uses.
message VolumeInfo {
  string sandbox_id = 1;
  int64 age_seconds = 2;
}

message ReclaimVolumeRequest {
  // sandbox_id names the per-sandbox volume backing dir to remove
  // (sandboxes/<sandbox_id>/volumes and its sandbox dir). It is validated
  // against the same path-safe pattern as a sandbox id before any path is built.
  string sandbox_id = 1;
}

message ReclaimVolumeResponse {}

// --- File operations ---

message ReadFileRequest {
  string sandbox_id = 1;
  string path = 2;
}

message ReadFileResponse {
  bytes content = 1;
  int64 size = 2;
}

message WriteFileRequest {
  string sandbox_id = 1;
  string path = 2;
  bytes content = 3;
  uint32 mode = 4;
}

message WriteFileResponse {}

message ListDirRequest {
  string sandbox_id = 1;
  string path = 2;
}

message ListDirResponse {
  repeated FileInfo entries = 1;
}

message FileInfo {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  int64 modified_at_unix = 4;
  uint32 mode = 5;
}

// --- Node capacity ---

message GetCapacityRequest {}

message GetCapacityResponse {
  int32 active_sandboxes = 1;
  int32 max_sandboxes = 2;
  int64 memory_total_bytes = 3;
  int64 memory_used_bytes = 4;
  int64 memory_shared_bytes = 5;
  repeated string template_ids = 6;
  repeated string snapshot_ids = 7;
  bool kvm_available = 8;
  // template_digests maps each template id to its content-addressed snapshot
  // manifest digest (safe to log). Lets the controller record the snapshot
  // identity in the SandboxPool status even for templates it did not just
  // build.
  map<string, string> template_digests = 9;
  // templates carries a per-template capacity estimate the controller uses to
  // project the marginal memory cost of placing a new fork: the shared set a
  // cold start pays once, and the average per-fork unique footprint a warm
  // fork adds. Derived from the node's CoW-aware metering.
  repeated TemplateCapacity templates = 10;
  // disk_free_bytes and disk_total_bytes are the data-dir filesystem free and
  // total bytes (statfs of the forkd dataDir). The controller's scheduler treats
  // a node with low disk headroom as having no build capacity, so it backs off
  // before the data dir fills and the kubelet evicts forkd on DiskPressure.
  // Both zero means unknown (statfs failed, e.g. a dev host) and is treated as
  // an unlimited budget, exactly like an unknown memory total. Disk numbers are
  // not secrets.
  int64 disk_free_bytes = 11;
  int64 disk_total_bytes = 12;
}

// TemplateCapacity is the per-template memory estimate the controller uses to
// bin-pack forks. shared_once_bytes is the template's CoW shared set counted a
// single time (paid once on a cold start of this template on a node).
// avg_fork_unique_bytes is the mean per-fork unique footprint (paid by every
// fork, warm or cold); when fork_count is 0 it is a small floor estimate.
message TemplateCapacity {
  string template_id = 1;
  string snapshot_digest = 2;
  int64 shared_once_bytes = 3;
  int64 avg_fork_unique_bytes = 4;
  int32 fork_count = 5;
}

// --- Shared types ---

message ResourceSpec {
  int32 vcpus = 1;
  int64 memory_mb = 2;
}

message EnvVar {
  string key = 1;
  string value = 2;
}

message SecretVar {
  string key = 1;
  string value = 2;
}

message NetworkConfig {
  string egress_policy = 1;
  repeated string allow_list = 2;
  // block_network drops ALL egress for the sandbox, overriding egress_policy and
  // the allowlists (Modal block_network=True).
  bool block_network = 3;
  // allow_cidrs is the egress CIDR allowlist: a destination IP inside any of
  // these blocks is accepted (Modal outbound_cidr_allowlist). v4 or v6 CIDRs.
  repeated string allow_cidrs = 4;
  // inbound governs unsolicited inbound to the guest: "deny" (the secure
  // default, deny-by-default) or "allow". Empty means deny.
  string inbound = 5;
  // inbound_cidrs narrows an inbound=allow to source CIDRs (Modal
  // inbound_cidr_allowlist). Only meaningful when inbound is allow.
  repeated string inbound_cidrs = 6;
}
