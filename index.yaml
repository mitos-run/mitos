apiVersion: v1
entries:
  mitos:
  - annotations:
      artifacthub.io/category: ai-machine-learning
      artifacthub.io/crds: |
        - kind: SandboxPool
          version: v1
          name: sandboxpools.mitos.run
          displayName: Sandbox Pool
          description: Warm pool of pre-snapshotted sandboxes with an inline template (Pools prepare).
        - kind: Sandbox
          version: v1
          name: sandboxes.mitos.run
          displayName: Sandbox
          description: A single running microVM sandbox instance, sourced from a pool, live fork, or revision (Sandboxes run).
        - kind: Workspace
          version: v1
          name: workspaces.mitos.run
          displayName: Workspace
          description: A durable, versioned filesystem a sandbox persists into (Workspaces persist).
        - kind: WorkspaceRevision
          version: v1
          name: workspacerevisions.mitos.run
          displayName: Workspace Revision
          description: One immutable snapshot in a workspace revision DAG.
      artifacthub.io/crdsExamples: |
        - apiVersion: mitos.run/v1
          kind: Sandbox
          metadata:
            name: agent-session-1
          spec:
            source:
              poolRef:
                name: python-agent-pool
            lifetime:
              timeout: 30m
      artifacthub.io/images: |
        - name: controller
          image: ghcr.io/mitos-run/mitos-controller:v1.30.0 # x-release-please-version
        - name: forkd
          image: ghcr.io/mitos-run/mitos-forkd:v1.30.0 # x-release-please-version
